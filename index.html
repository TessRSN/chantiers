    // ═══════════════════════════════════════════════════════════════════════════
    // VUE GLOBALE — COMPOSANT GRAPHE RADIAL
    // ═══════════════════════════════════════════════════════════════════════════

    function RSNRadialGraph({ darkMode }) {
      const [selectedNode, setSelectedNode] = useState(null);
      const [hoveredConnection, setHoveredConnection] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');

      const searchResults = useMemo(() => {
        if (!searchTerm.trim()) return [];
        const term = searchTerm.toLowerCase();
        return vueGlobaleData.actions.filter(a =>
          a.action.toLowerCase().includes(term) ||
          a.id.toLowerCase().includes(term)
        );
      }, [searchTerm]);

      const highlightedAxes = useMemo(() => [...new Set(searchResults.map(a => a.axe))], [searchResults]);
      const highlightedChantiers = useMemo(() => [...new Set(searchResults.map(a => a.chantier))], [searchResults]);

      const theme = {
        bg: darkMode ? 'bg-slate-950' : 'bg-gray-100',
        text: darkMode ? 'text-white' : 'text-gray-900',
        textMuted: darkMode ? 'text-slate-400' : 'text-gray-500',
        textLight: darkMode ? 'text-slate-500' : 'text-gray-400',
        cardBg: darkMode ? 'bg-slate-900' : 'bg-white',
        cardBorder: darkMode ? 'border-slate-800' : 'border-gray-200',
        buttonBg: darkMode ? 'bg-slate-800 hover:bg-slate-700' : 'bg-gray-200 hover:bg-gray-300',
        svgBg: darkMode ? '#0F172A' : '#FFFFFF',
        svgStroke: darkMode ? '#334155' : '#CBD5E1',
        svgNodeBg: darkMode ? '#1E293B' : '#F3F4F6',
        svgLabelPrimary: darkMode ? '#E2E8F0' : '#1F2937',
        svgLabelSecondary: darkMode ? '#94A3B8' : '#6B7280',
        svgLabelTertiary: darkMode ? '#64748B' : '#9CA3AF',
      };

      const width = 900;
      const height = 900;
      const centerX = width / 2;
      const centerY = height / 2;
      const innerRadius = 70;
      const axeRadius = 320;
      const chantierRadius = 200;
      const effetRadius = 70;

      const effetsStrategiques = [
        { id: 'ES1', name: 'Consolidation écosystème', color: '#3B82F6', chantiers: ['C1', 'C2'] },
        { id: 'ES2', name: 'Maillage environnement', color: '#10B981', chantiers: ['C3', 'C4', 'C7'] },
        { id: 'ES3', name: 'Rapprochement preneurs/décideurs', color: '#F59E0B', chantiers: ['C5', 'C6'] },
      ];

      const effetPositions = useMemo(() => {
        return effetsStrategiques.map((effet, i) => {
          const angle = (i / effetsStrategiques.length) * 2 * Math.PI - Math.PI / 2;
          return { ...effet, x: centerX + Math.cos(angle) * effetRadius, y: centerY + Math.sin(angle) * effetRadius, angle };
        });
      }, []);

      const connections = useMemo(() => {
        const conn = [];
        vueGlobaleData.chantiers.forEach(chantier => {
          vueGlobaleData.axes.forEach(axe => {
            const actions = vueGlobaleData.actions.filter(a => a.axe === axe.id && a.chantier === chantier.id);
            if (actions.length > 0) conn.push({ axe: axe.id, chantier: chantier.id, count: actions.length, actions });
          });
        });
        return conn;
      }, []);

      const axePositions = useMemo(() => {
        return vueGlobaleData.axes.map((axe, i) => {
          const angle = (i / vueGlobaleData.axes.length) * 2 * Math.PI - Math.PI / 2;
          return { ...axe, x: centerX + Math.cos(angle) * axeRadius, y: centerY + Math.sin(angle) * axeRadius, angle };
        });
      }, []);

      const chantierPositions = useMemo(() => {
        return vueGlobaleData.chantiers.map((chantier, i) => {
          const angle = (i / vueGlobaleData.chantiers.length) * 2 * Math.PI - Math.PI / 2;
          return { ...chantier, x: centerX + Math.cos(angle) * chantierRadius, y: centerY + Math.sin(angle) * chantierRadius, angle };
        });
      }, []);

      const getAxePos = (id) => axePositions.find(a => a.id === id);
      const getChantierPos = (id) => chantierPositions.find(c => c.id === id);

      const isHighlighted = (conn) => {
        if (!selectedNode) return true;
        return conn.axe === selectedNode.id || conn.chantier === selectedNode.id;
      };

      const selectedActions = useMemo(() => {
        if (!selectedNode) return [];
        if (selectedNode.type === 'chantier') return vueGlobaleData.actions.filter(a => a.chantier === selectedNode.id);
        return vueGlobaleData.actions.filter(a => a.axe === selectedNode.id);
      }, [selectedNode]);

      return (
        <div className={`${darkMode ? 'bg-slate-950' : 'bg-gray-100'} p-4 transition-colors duration-300`} style={{ height: 'calc(100vh - 49px)', overflowY: 'auto' }}>
          <div className="max-w-7xl mx-auto">
            <div className="text-center mb-6">
              <div className="flex justify-between items-center mb-4">
                <div className="flex-1"></div>
                <div className="flex-1 max-w-md mx-4">
                  <div className="relative">
                    <input
                      type="text"
                      placeholder="Rechercher une action..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                      className={`w-full px-4 py-2 pl-10 rounded-full text-sm ${darkMode ? 'bg-slate-800 text-white placeholder-slate-400 border-slate-700' : 'bg-white text-gray-900 placeholder-gray-400 border-gray-300'} border focus:outline-none focus:ring-2 focus:ring-purple-500`}
                    />
                    <svg className={`absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 ${darkMode ? 'text-slate-400' : 'text-gray-400'}`} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    {searchTerm && (
                      <button onClick={() => setSearchTerm('')} className={`absolute right-3 top-1/2 -translate-y-1/2 ${darkMode ? 'text-slate-400 hover:text-white' : 'text-gray-400 hover:text-gray-600'}`}>✕</button>
                    )}
                  </div>
                  {searchTerm && (
                    <div className={`mt-1 text-xs ${theme.textMuted}`}>
                      {searchResults.length} action{searchResults.length !== 1 ? 's' : ''} trouvée{searchResults.length !== 1 ? 's' : ''}
                    </div>
                  )}
                </div>
                <div className="flex-1"></div>
              </div>
              <h1 className={`text-3xl font-bold ${darkMode ? 'bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400' : 'bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600'} bg-clip-text text-transparent mb-2`}>
                Réseau des Actions RSN
              </h1>
              <p className={`${theme.textMuted} text-sm`}>
                Cliquez sur un nœud pour voir ses connexions • {vueGlobaleData.actions.length} actions • {vueGlobaleData.axes.length} axes • {vueGlobaleData.chantiers.length} chantiers
              </p>
              {selectedNode && (
                <button onClick={() => setSelectedNode(null)} className={`mt-2 px-4 py-1 ${theme.buttonBg} rounded-full text-sm transition-colors ${theme.text}`}>
                  ✕ Réinitialiser la sélection
                </button>
              )}
            </div>

            <div className="flex flex-col lg:flex-row gap-6">
              <div className="flex-1 flex justify-center">
                <svg width={width} height={height} className="max-w-full h-auto">
                  <defs>
                    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
                      <stop offset="0%" stopColor="#6366F1" stopOpacity="0.3" />
                      <stop offset="100%" stopColor="#6366F1" stopOpacity="0" />
                    </radialGradient>
                  </defs>
                  <circle cx={centerX} cy={centerY} r={chantierRadius} fill="none" stroke={theme.svgStroke} strokeWidth="1" strokeDasharray="4 4" opacity="0.5" />
                  <circle cx={centerX} cy={centerY} r={axeRadius} fill="none" stroke={theme.svgStroke} strokeWidth="1" strokeDasharray="4 4" opacity="0.5" />

                  {effetPositions.map((effet) => {
                    const isEffetSelected = selectedNode?.id === effet.id && selectedNode?.type === 'effet';
                    const anyEffetSelected = selectedNode?.type === 'effet';
                    return effet.chantiers.map((chantierId) => {
                      const chantierPos = getChantierPos(chantierId);
                      if (!chantierPos) return null;
                      const highlighted = isEffetSelected || !anyEffetSelected;
                      return (
                        <line key={`${effet.id}-${chantierId}`} x1={effet.x} y1={effet.y} x2={chantierPos.x} y2={chantierPos.y}
                          stroke={effet.color} strokeWidth={isEffetSelected ? 4 : 3}
                          opacity={highlighted ? (isEffetSelected ? 0.8 : 0.4) : 0.1} className="transition-opacity duration-300" />
                      );
                    });
                  })}

                  {connections.map((conn, i) => {
                    const axePos = getAxePos(conn.axe);
                    const chantierPos = getChantierPos(conn.chantier);
                    const highlighted = isHighlighted(conn) && selectedNode?.type !== 'effet';
                    const isHovered = hoveredConnection === `${conn.axe}-${conn.chantier}`;
                    const midX = (axePos.x + chantierPos.x) / 2;
                    const midY = (axePos.y + chantierPos.y) / 2;
                    const ctrlX = centerX + (midX - centerX) * 0.3;
                    const ctrlY = centerY + (midY - centerY) * 0.3;
                    return (
                      <g key={i}>
                        <path d={`M ${chantierPos.x} ${chantierPos.y} Q ${ctrlX} ${ctrlY} ${axePos.x} ${axePos.y}`}
                          fill="none" stroke={axePos.color} strokeWidth={Math.max(1, conn.count * 1.5)}
                          opacity={highlighted ? (isHovered ? 0.9 : 0.5) : 0.08} className="transition-opacity duration-300"
                          onMouseEnter={() => setHoveredConnection(`${conn.axe}-${conn.chantier}`)}
                          onMouseLeave={() => setHoveredConnection(null)} style={{ cursor: 'pointer' }} />
                        {isHovered && selectedNode?.type !== 'effet' && (
                          <text x={ctrlX} y={ctrlY} fill={theme.svgLabelPrimary} fontSize="12" textAnchor="middle" className="pointer-events-none">
                            {conn.count} action{conn.count > 1 ? 's' : ''}
                          </text>
                        )}
                      </g>
                    );
                  })}

                  {chantierPositions.map((chantier) => {
                    const isSelected = selectedNode?.id === chantier.id;
                    const isRelated = selectedNode && connections.some(c => c.chantier === chantier.id && c.axe === selectedNode.id);
                    const isRelatedToEffet = selectedNode?.type === 'effet' && selectedNode?.chantiers?.includes(chantier.id);
                    const isSearchHighlighted = searchTerm && highlightedChantiers.includes(chantier.id);
                    const dimmed = (selectedNode && !isSelected && !isRelated && selectedNode.type !== 'chantier' && selectedNode.type !== 'effet') ||
                                   (selectedNode?.type === 'effet' && !isRelatedToEffet) ||
                                   (searchTerm && !isSearchHighlighted);
                    const chantierActionCount = vueGlobaleData.actions.filter(a => a.chantier === chantier.id).length;
                    const searchCount = searchResults.filter(a => a.chantier === chantier.id).length;
                    const percentage = Math.round((chantierActionCount / vueGlobaleData.actions.length) * 100);
                    return (
                      <g key={chantier.id} onClick={() => setSelectedNode(isSelected ? null : {...chantier, type: 'chantier'})}
                        style={{ cursor: 'pointer' }} opacity={dimmed ? 0.3 : 1} className="transition-opacity duration-300">
                        <circle cx={chantier.x} cy={chantier.y} r={isSelected || isSearchHighlighted ? 42 : 38}
                          fill={theme.svgNodeBg} stroke={isSearchHighlighted && !isSelected ? '#A855F7' : chantier.color}
                          strokeWidth={isSelected || isSearchHighlighted ? 4 : 2} />
                        <text x={chantier.x} y={chantier.y - 10} fill={theme.svgLabelPrimary} fontSize="18" textAnchor="middle">{chantier.icon}</text>
                        <text x={chantier.x} y={chantier.y + 6} fill={isSearchHighlighted ? '#A855F7' : chantier.color} fontSize="10" fontWeight="bold" textAnchor="middle">
                          {isSearchHighlighted ? searchCount : percentage + '%'}
                        </text>
                        <text x={chantier.x} y={chantier.y + 18} fill={theme.svgLabelSecondary} fontSize="7" textAnchor="middle">
                          {isSearchHighlighted ? 'résultat' + (searchCount > 1 ? 's' : '') : chantier.verb}
                        </text>
                        <text x={chantier.x} y={chantier.y + (chantier.y > centerY ? 58 : -48)}
                          fill={theme.svgLabelPrimary} fontSize="11" fontWeight="500" textAnchor="middle">{chantier.name}</text>
                      </g>
                    );
                  })}

                  {axePositions.map((axe) => {
                    const isSelected = selectedNode?.id === axe.id;
                    const isRelated = selectedNode && connections.some(c => c.axe === axe.id && c.chantier === selectedNode.id);
                    const isSearchHighlighted = searchTerm && highlightedAxes.includes(axe.id);
                    const dimmed = (selectedNode && !isSelected && !isRelated && selectedNode.type === 'chantier') ||
                                   (selectedNode?.type === 'effet') ||
                                   (searchTerm && !isSearchHighlighted);
                    const labelAngle = axe.angle;
                    const labelRadius = axeRadius + 45;
                    const labelX = centerX + Math.cos(labelAngle) * labelRadius;
                    const labelY = centerY + Math.sin(labelAngle) * labelRadius;
                    const actionCount = vueGlobaleData.actions.filter(a => a.axe === axe.id).length;
                    const searchCount = searchResults.filter(a => a.axe === axe.id).length;
                    return (
                      <g key={axe.id} onClick={() => setSelectedNode(isSelected ? null : axe)}
                        style={{ cursor: 'pointer' }} opacity={dimmed ? 0.3 : 1} className="transition-opacity duration-300">
                        <circle cx={axe.x} cy={axe.y} r={isSelected || isSearchHighlighted ? 28 : 24}
                          fill={axe.color} opacity={0.9}
                          stroke={isSelected ? 'white' : isSearchHighlighted ? '#A855F7' : 'transparent'} strokeWidth={3} />
                        <text x={axe.x} y={axe.y + 5} fill="white" fontSize="11" fontWeight="bold" textAnchor="middle">
                          {isSearchHighlighted ? searchCount : actionCount}
                        </text>
                        <text x={labelX} y={labelY} fill={theme.svgLabelPrimary} fontSize="10" fontWeight="500"
                          textAnchor={labelX > centerX ? "start" : "end"} dominantBaseline="middle">{axe.name}</text>
                        <text x={labelX} y={labelY + 12} fill={theme.svgLabelTertiary} fontSize="8"
                          textAnchor={labelX > centerX ? "start" : "end"}>
                          {axe.type === 'axe' ? 'Axe' : axe.type === 'champ' ? "Champ d'action" : 'Principe'}
                        </text>
                      </g>
                    );
                  })}

                  {effetPositions.map((effet) => {
                    const effetActionCount = effet.chantiers.reduce((sum, cId) => sum + vueGlobaleData.actions.filter(a => a.chantier === cId).length, 0);
                    const percentage = Math.round((effetActionCount / vueGlobaleData.actions.length) * 100);
                    const isSelected = selectedNode?.id === effet.id;
                    return (
                      <g key={effet.id} onClick={() => setSelectedNode(isSelected ? null : {...effet, type: 'effet'})} style={{ cursor: 'pointer' }}>
                        <circle cx={effet.x} cy={effet.y} r={isSelected ? 42 : 38}
                          fill={theme.svgBg} stroke={effet.color} strokeWidth={isSelected ? 4 : 3} />
                        <text x={effet.x} y={effet.y - 8} fill={effet.color} fontSize="12" fontWeight="bold" textAnchor="middle">{percentage}%</text>
                        <text x={effet.x} y={effet.y + 5} fill={theme.svgLabelPrimary} fontSize="7" fontWeight="500" textAnchor="middle">{effet.name.split(' ')[0]}</text>
                        <text x={effet.x} y={effet.y + 14} fill={theme.svgLabelSecondary} fontSize="6" textAnchor="middle">{effet.name.split(' ').slice(1).join(' ')}</text>
                      </g>
                    );
                  })}
                </svg>
              </div>

              {searchTerm && searchResults.length > 0 && !selectedNode && (
                <div className={`lg:w-80 ${theme.cardBg} rounded-2xl p-5 max-h-[700px] overflow-y-auto border ${theme.cardBorder}`}>
                  <div className={`flex items-center gap-3 mb-4 pb-4 border-b ${theme.cardBorder}`}>
                    <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold bg-purple-500">{searchResults.length}</div>
                    <div>
                      <h3 className={`font-bold ${theme.text} text-sm`}>Résultats de recherche</h3>
                      <span className={`text-xs ${theme.textLight}`}>"{searchTerm}"</span>
                    </div>
                  </div>
                  <div className="space-y-4">
                    {vueGlobaleData.chantiers.map(chantier => {
                      const chantierResults = searchResults.filter(a => a.chantier === chantier.id);
                      if (chantierResults.length === 0) return null;
                      return (
                        <div key={chantier.id} className={`${darkMode ? 'bg-slate-800/50' : 'bg-gray-100'} rounded-xl p-3`}>
                          <div className="flex items-center gap-2 mb-2">
                            <span>{chantier.icon}</span>
                            <span className={`text-xs font-medium ${darkMode ? 'text-slate-300' : 'text-gray-700'}`}>{chantier.name}</span>
                            <span className={`text-xs ${theme.textLight}`}>({chantierResults.length})</span>
                          </div>
                          {chantierResults.map(action => {
                            const axe = vueGlobaleData.axes.find(a => a.id === action.axe);
                            return (
                              <ActionDetail key={action.id} action={action} darkMode={darkMode} theme={theme} borderColor={axe?.color} showAxeLabel={true} />
                            );
                          })}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {selectedNode && (
                <div className={`lg:w-80 ${theme.cardBg} rounded-2xl p-5 max-h-[700px] overflow-y-auto border ${theme.cardBorder}`}>
                  <div className={`flex items-center gap-3 mb-4 pb-4 border-b ${theme.cardBorder}`}>
                    {selectedNode.type === 'chantier' ? (
                      <>
                        <span className="text-3xl">{selectedNode.icon}</span>
                        <div>
                          <h3 className={`font-bold ${theme.text}`}>{selectedNode.name}</h3>
                          <span className="text-xs px-2 py-0.5 rounded-full" style={{ backgroundColor: selectedNode.color + '30', color: selectedNode.color }}>{selectedNode.verb}</span>
                        </div>
                      </>
                    ) : (
                      <>
                        <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold" style={{ backgroundColor: selectedNode.color }}>
                          {vueGlobaleData.actions.filter(a => a.axe === selectedNode.id).length}
                        </div>
                        <div>
                          <h3 className={`font-bold ${theme.text} text-sm`}>{selectedNode.name}</h3>
                          <span className={`text-xs ${theme.textLight}`}>
                            {selectedNode.type === 'axe' ? 'Axe thématique' : selectedNode.type === 'champ' ? "Champ d'action" : 'Principe directeur'}
                          </span>
                        </div>
                      </>
                    )}
                  </div>
                  <div className="space-y-4">
                    <div className={`text-sm ${theme.textMuted} mb-2`}>{selectedActions.length} action{selectedActions.length > 1 ? 's' : ''}</div>
                    {selectedNode.type === 'chantier' ? (
                      vueGlobaleData.axes.map(axe => {
                        const axeActions = selectedActions.filter(a => a.axe === axe.id);
                        if (axeActions.length === 0) return null;
                        return (
                          <div key={axe.id} className={`${darkMode ? 'bg-slate-800/50' : 'bg-gray-100'} rounded-xl p-3`}>
                            <div className="flex items-center gap-2 mb-2">
                              <div className="w-3 h-3 rounded-full" style={{ backgroundColor: axe.color }} />
                              <span className={`text-xs font-medium ${darkMode ? 'text-slate-300' : 'text-gray-700'}`}>{axe.name}</span>
                              <span className={`text-xs ${theme.textLight}`}>({axeActions.length})</span>
                            </div>
                            {axeActions.map(action => (
                              <ActionDetail key={action.id} action={action} darkMode={darkMode} theme={theme} borderColor={axe.color} />
                            ))}
                          </div>
                        );
                      })
                    ) : (
                      vueGlobaleData.chantiers.map(chantier => {
                        const chantierActions = selectedActions.filter(a => a.chantier === chantier.id);
                        if (chantierActions.length === 0) return null;
                        return (
                          <div key={chantier.id} className={`${darkMode ? 'bg-slate-800/50' : 'bg-gray-100'} rounded-xl p-3`}>
                            <div className="flex items-center gap-2 mb-2">
                              <span>{chantier.icon}</span>
                              <span className={`text-xs font-medium ${darkMode ? 'text-slate-300' : 'text-gray-700'}`}>{chantier.name}</span>
                              <span className={`text-xs ${theme.textLight}`}>({chantierActions.length})</span>
                            </div>
                            {chantierActions.map(action => (
                              <ActionDetail key={action.id} action={action} darkMode={darkMode} theme={theme} />
                            ))}
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>
              )}
            </div>

            <div className="mt-6 flex flex-wrap justify-center gap-4 text-xs pb-6">
              <div className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-full bg-blue-500"></div>
                <span className={theme.textMuted}>Axes thématiques (4)</span>
              </div>
              <div className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-full bg-teal-500"></div>
                <span className={theme.textMuted}>Champs d'action (3)</span>
              </div>
              <div className="flex items-center gap-2">
                <div className="w-3 h-3 rounded-full bg-purple-500"></div>
                <span className={theme.textMuted}>Principes directeurs (5)</span>
              </div>
              <div className="flex items-center gap-2">
                <div className={`w-6 h-6 rounded-lg ${darkMode ? 'bg-slate-800' : 'bg-gray-200'} flex items-center justify-center`}>🎯</div>
                <span className={theme.textMuted}>Chantiers (7)</span>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // STRUCTURE & GOUVERNANCE
    // ═══════════════════════════════════════════════════════════════════════════

    const GOUVERNANCE_DATA = {
      direction: [
        { name: 'Sara Ahmed', role: 'Directrice', initials: 'SA' },
        { name: 'Philippe Després', role: 'Codirecteur', initials: 'PD' },
        { name: 'Aude Motulsky', role: 'Codirectrice', initials: 'AM' },
        { name: 'Bouchra Nasri', role: 'Codirectrice', initials: 'BN' },
        { name: 'Martin Vallières', role: 'Codirecteur', initials: 'MV' },
      ],
      comites: [
        { id: 'comite-sci', name: 'Comité scientifique', responsables: [] },
        { id: 'comite-avis', name: 'Comité aviseur', responsables: [] },
        { id: 'comite-etud', name: 'Comité étudiants', responsables: [] },
      ],
      axes: [
        { id: 'A1', shortName: 'Axe 1', name: 'Plateformes numériques et gouvernance informationnelle', label: 'Plateformes', description: 'Générer et gérer des données de qualité et de confiance', color: '#3B82F6', responsables: [{ name: 'Jean Nikiema', initials: 'JN' }, { name: 'Robert Platt', initials: 'RP' }] },
        { id: 'A2', shortName: 'Axe 2', name: 'Modélisation et méthodes numériques', label: 'Modélisation', description: "Création et validation d'algorithmes, incluant la modélisation mathématique, les méthodes statistiques et l'IA", color: '#8B5CF6', responsables: [{ name: 'Morgan Craig', initials: 'MC' }, { name: 'Audrey Durand', initials: 'AD' }, { name: 'Denis Talbot', initials: 'DT' }] },
        { id: 'A3', shortName: 'Axe 3', name: 'Interventions numériques', label: 'Interventions', description: "Cycle de vie des interventions numériques, synthèses des évidences, de la conception à l'implantation, incluant l'adoption et la mise à l'échelle", color: '#EC4899', responsables: [{ name: 'Alexander Baldwin', initials: 'AB' }, { name: 'Louis Valiquette', initials: 'LV' }, { name: 'Anmar Khadra', initials: 'AK' }] },
        { id: 'A4', shortName: 'Axe 4', name: 'Transformation numérique', label: 'Transformation', description: 'Transformation des organisations, du système et des politiques soutenant le cycle de vie des interventions numériques', color: '#F59E0B', responsables: [{ name: 'Pierre-Luc Déziel', initials: 'PLD' }, { name: 'Samer Faraj', initials: 'SF' }, { name: 'Nitika Pai', initials: 'NP' }] },
      ],
      champs: [
        { id: 'CA-RENF', name: 'Renforcement', fullName: 'Renforcement des capacités', label: 'Renforcement', color: '#10B981', responsables: [{ name: 'Bessam Abdulrazak', initials: 'BA' }, { name: 'Sylvie Lambert', initials: 'SL' }] },
        { id: 'CA-FORM', name: 'Formation', fullName: 'Formation interdisciplinaire', label: 'Formation', color: '#14B8A6', responsables: [{ name: 'Celia Greenwood', initials: 'CG' }, { name: 'Nitika Pai', initials: 'NP' }] },
        { id: 'CA-MOB', name: 'Mobilisation', fullName: 'Mobilisation des connaissances', label: 'Mobilisation', color: '#06B6D4', responsables: [{ name: 'Aliki Thomas', initials: 'AT' }, { name: 'Tatiana Ogourtsova', initials: 'TO' }] },
      ],
      principes: [
        { id: 'PD-EDIA', name: 'EDIA', fullName: 'Équité, Diversité, Inclusion, Accessibilité', label: 'EDIA', color: '#EF4444', responsables: [{ name: 'Amédé Gogovor', initials: 'AG' }] },
        { id: 'PD-CONF', name: 'Num. confiance', fullName: 'Numérique de confiance', label: 'Confiance', color: '#A855F7', responsables: [{ name: 'Annabelle Cumyn', initials: 'AC' }, { name: 'Vanessa Nabelsi', initials: 'VN' }] },
        { id: 'PD-ENG', name: 'Engagement', fullName: 'Engagement citoyen', label: 'Engagement', color: '#6366F1', responsables: [{ name: 'Susan Bartlett', initials: 'SB' }, { name: 'Marie-Pascale Pomey', initials: 'MPP' }] },
        { id: 'PD-DUR', name: 'Santé durable', fullName: 'Santé durable', label: 'Santé durable', color: '#22C55E', responsables: [{ name: 'Holly Witteman', initials: 'HW' }, { name: 'Patrick Archambault', initials: 'PA' }] },
        { id: 'PD-SCI', name: 'Science ouverte', fullName: 'Science ouverte', label: 'Science ouv.', color: '#EAB308', responsables: [{ name: 'Louis Archambault', initials: 'LA' }, { name: 'Toby Hocking', initials: 'TH' }] },
      ],
    };

    function StructureGouvernance({ darkMode }) {
      const [selectedNode, setSelectedNode] = useState(null);

      const theme = {
        text: darkMode ? 'text-white' : 'text-gray-900',
        textMuted: darkMode ? 'text-slate-400' : 'text-gray-500',
        textLight: darkMode ? 'text-slate-500' : 'text-gray-400',
        cardBg: darkMode ? 'bg-slate-900' : 'bg-white',
        cardBorder: darkMode ? 'border-slate-800' : 'border-gray-200',
        buttonBg: darkMode ? 'bg-slate-800 hover:bg-slate-700' : 'bg-gray-200 hover:bg-gray-300',
        svgStroke: darkMode ? '#334155' : '#CBD5E1',
        svgNodeBg: darkMode ? '#1E293B' : '#F3F4F6',
        svgLabelFill: darkMode ? '#E2E8F0' : '#1F2937',
        svgLabelMuted: darkMode ? '#94A3B8' : '#6B7280',
        svgLabelDim: darkMode ? '#64748B' : '#9CA3AF',
      };

      // Larger SVG with labels inside nodes — no external labels = no overlap
      const width = 750, height = 750;
      const cx = width / 2, cy = height / 2;
      const axeR = 120, champR = 235, princR = 340;
      const axeNodeR = 34, champNodeR = 30, princNodeR = 28;

      const axePositions = useMemo(() => {
        return GOUVERNANCE_DATA.axes.map((ax, i) => {
          const angle = (i / 4) * 2 * Math.PI - Math.PI / 2;
          return { ...ax, type: 'axe', x: cx + Math.cos(angle) * axeR, y: cy + Math.sin(angle) * axeR, angle };
        });
      }, []);

      const champPositions = useMemo(() => {
        return GOUVERNANCE_DATA.champs.map((ch, i) => {
          const angle = (i / 3) * 2 * Math.PI - Math.PI / 2 + Math.PI / 6;
          return { ...ch, type: 'champ', x: cx + Math.cos(angle) * champR, y: cy + Math.sin(angle) * champR, angle };
        });
      }, []);

      const principePositions = useMemo(() => {
        return GOUVERNANCE_DATA.principes.map((pr, i) => {
          const angle = (i / 5) * 2 * Math.PI - Math.PI / 2;
          return { ...pr, type: 'principe', x: cx + Math.cos(angle) * princR, y: cy + Math.sin(angle) * princR, angle };
        });
      }, []);

      const handleClick = (node) => {
        setSelectedNode(prev => prev?.id === node.id ? null : node);
      };

      const handleGovClick = (type, data) => {
        setSelectedNode(prev => prev?.id === data.id ? null : { ...data, type });
      };

      // Governance box component (Direction + comités)
      const GovBox = ({ item, type, icon }) => {
        const isSelected = selectedNode?.id === item.id;
        const dimmed = selectedNode && !isSelected;
        const borderColor = isSelected ? (darkMode ? '#60a5fa' : '#2563eb') : (darkMode ? '#334155' : '#d1d5db');
        return (
          <div
            onClick={() => handleGovClick(type, {
              ...item, id: item.id || 'direction',
              fullName: item.name || 'Direction du RSN',
              color: darkMode ? '#1e40af' : '#3b82f6',
              responsables: item.responsables || GOUVERNANCE_DATA.direction,
            })}
            className="transition-all duration-200"
            style={{
              padding: '8px 14px', borderRadius: 12, cursor: 'pointer',
              border: `2px solid ${borderColor}`,
              backgroundColor: darkMode ? '#1e293b' : '#ffffff',
              opacity: dimmed ? 0.4 : 1,
            }}
          >
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 14 }}>{icon}</span>
              <div>
                <div style={{ fontSize: 12, fontWeight: 600, color: darkMode ? '#e2e8f0' : '#1f2937' }}>{item.name || 'Direction'}</div>
                <div style={{ fontSize: 10, color: darkMode ? '#64748b' : '#9ca3af' }}>
                  {(item.responsables || GOUVERNANCE_DATA.direction).length > 0
                    ? `${(item.responsables || GOUVERNANCE_DATA.direction).length} membre${(item.responsables || GOUVERNANCE_DATA.direction).length > 1 ? 's' : ''}`
                    : 'À venir'}
                </div>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className={`${darkMode ? 'bg-slate-950' : 'bg-gray-100'} p-4 transition-colors duration-300`} style={{ height: 'calc(100vh - 49px)', overflowY: 'auto' }}>
          <div className="max-w-7xl mx-auto">
            {/* ── Header ── */}
            <div className="text-center mb-3">
              <h1 className={`text-3xl font-bold ${darkMode ? 'bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400' : 'bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600'} bg-clip-text text-transparent mb-1`}>
                Structure scientifique du RSN
              </h1>
              <p className={`${theme.textMuted} text-sm`}>
                Cliquez sur un élément pour voir ses responsables
              </p>
              {selectedNode && (
                <button onClick={() => setSelectedNode(null)} className={`mt-2 px-4 py-1 ${theme.buttonBg} rounded-full text-sm transition-colors ${theme.text}`}>
                  ✕ Réinitialiser
                </button>
              )}
            </div>

            <div className="relative">
              {/* ── Gouvernance boxes — top left ── */}
              <div className="absolute left-0 top-0 z-20 flex flex-col gap-2" style={{ width: 200 }}>
                <div style={{ fontSize: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.05em', color: darkMode ? '#64748b' : '#9ca3af', marginBottom: 2, paddingLeft: 4 }}>
                  Gouvernance
                </div>
                <GovBox item={{ id: 'direction', name: 'Direction', responsables: GOUVERNANCE_DATA.direction }} type="direction" icon="◆" />
                {GOUVERNANCE_DATA.comites.map(c => (
                  <GovBox key={c.id} item={c} type="comite" icon="◇" />
                ))}
              </div>

              {/* ── SVG radial diagram ── */}
              <div className="flex justify-center">
                <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} className="max-w-full h-auto">
                  {/* Guide circles */}
                  <circle cx={cx} cy={cy} r={axeR} fill="none" stroke={theme.svgStroke} strokeWidth="1" strokeDasharray="4 4" opacity="0.6" />
                  <circle cx={cx} cy={cy} r={champR} fill="none" stroke={theme.svgStroke} strokeWidth="1" strokeDasharray="4 4" opacity="0.6" />
                  <circle cx={cx} cy={cy} r={princR} fill="none" stroke={theme.svgStroke} strokeWidth="1" strokeDasharray="4 4" opacity="0.6" />

                  {/* Ring labels — positioned in clear areas between nodes */}
                  <text x={cx} y={cy - axeR - 10} fill={theme.svgLabelDim} fontSize="8" textAnchor="middle" fontWeight="600" letterSpacing="0.08em" opacity="0.7">AXES THÉMATIQUES</text>
                  <text x={cx} y={cy - champR - 8} fill={theme.svgLabelDim} fontSize="8" textAnchor="middle" fontWeight="600" letterSpacing="0.08em" opacity="0.7">CHAMPS D'ACTION</text>
                  <text x={cx} y={cy - princR - 8} fill={theme.svgLabelDim} fontSize="8" textAnchor="middle" fontWeight="600" letterSpacing="0.08em" opacity="0.7">PRINCIPES DIRECTEURS</text>

                  {/* Center — RSN */}
                  <circle cx={cx} cy={cy} r={32} fill={theme.svgNodeBg}
                    stroke={darkMode ? '#475569' : '#94a3b8'} strokeWidth="1.5" />
                  <text x={cx} y={cy + 1} fill={theme.svgLabelFill} fontSize="13" fontWeight="700" textAnchor="middle" dominantBaseline="middle">RSN</text>

                  {/* ── Axes (inner ring) — labels INSIDE nodes ── */}
                  {axePositions.map(ax => {
                    const isSel = selectedNode?.id === ax.id;
                    const dim = selectedNode && !isSel;
                    return (
                      <g key={ax.id} onClick={() => handleClick(ax)} style={{ cursor: 'pointer' }}
                        opacity={dim ? 0.25 : 1} className="transition-opacity duration-300">
                        <circle cx={ax.x} cy={ax.y} r={isSel ? axeNodeR + 3 : axeNodeR}
                          fill={ax.color} opacity={0.9}
                          stroke={isSel ? 'white' : 'transparent'} strokeWidth={3} />
                        <text x={ax.x} y={ax.y - 8} fill="white" fontSize="8" fontWeight="700" textAnchor="middle">{ax.shortName}</text>
                        <text x={ax.x} y={ax.y + 4} fill="rgba(255,255,255,0.85)" fontSize="8" textAnchor="middle">{ax.label}</text>
                        <text x={ax.x} y={ax.y + 15} fill="rgba(255,255,255,0.5)" fontSize="7" textAnchor="middle">{ax.responsables.length} resp.</text>
                      </g>
                    );
                  })}

                  {/* ── Champs d'action (middle ring) — labels INSIDE ── */}
                  {champPositions.map(ch => {
                    const isSel = selectedNode?.id === ch.id;
                    const dim = selectedNode && !isSel;
                    return (
                      <g key={ch.id} onClick={() => handleClick(ch)} style={{ cursor: 'pointer' }}
                        opacity={dim ? 0.25 : 1} className="transition-opacity duration-300">
                        <circle cx={ch.x} cy={ch.y} r={isSel ? champNodeR + 3 : champNodeR}
                          fill={theme.svgNodeBg} stroke={ch.color} strokeWidth={isSel ? 3.5 : 2} />
                        <text x={ch.x} y={ch.y - 4} fill={ch.color} fontSize="9" fontWeight="700" textAnchor="middle">{ch.label}</text>
                        <text x={ch.x} y={ch.y + 9} fill={theme.svgLabelMuted} fontSize="7" textAnchor="middle">{ch.responsables.length} resp.</text>
                      </g>
                    );
                  })}

                  {/* ── Principes directeurs (outer ring) — labels INSIDE ── */}
                  {principePositions.map(pr => {
                    const isSel = selectedNode?.id === pr.id;
                    const dim = selectedNode && !isSel;
                    return (
                      <g key={pr.id} onClick={() => handleClick(pr)} style={{ cursor: 'pointer' }}
                        opacity={dim ? 0.25 : 1} className="transition-opacity duration-300">
                        <circle cx={pr.x} cy={pr.y} r={isSel ? princNodeR + 3 : princNodeR}
                          fill={pr.color} opacity={0.9}
                          stroke={isSel ? 'white' : 'transparent'} strokeWidth={3} />
                        <text x={pr.x} y={pr.y - 3} fill="white" fontSize="8.5" fontWeight="600" textAnchor="middle">{pr.label}</text>
                        <text x={pr.x} y={pr.y + 9} fill="rgba(255,255,255,0.6)" fontSize="7" textAnchor="middle">{pr.responsables.length} resp.</text>
                      </g>
                    );
                  })}
                </svg>
              </div>

              {/* ── Detail panel — overlay right ── */}
              {selectedNode && (
                <div className={`absolute right-0 top-0 w-80 ${theme.cardBg} rounded-2xl p-5 max-h-[600px] overflow-y-auto border ${theme.cardBorder} shadow-xl z-10`}
                  style={{ backdropFilter: 'blur(8px)' }}>
                  <div className={`flex items-center gap-3 mb-4 pb-4 border-b ${theme.cardBorder}`}>
                    <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold text-sm"
                      style={{ backgroundColor: selectedNode.color }}>
                      {selectedNode.type === 'direction' || selectedNode.type === 'comite'
                        ? (selectedNode.responsables?.length || '—')
                        : selectedNode.type === 'axe' ? selectedNode.shortName?.replace('Axe ', '') : selectedNode.responsables?.length}
                    </div>
                    <div>
                      <h3 className={`font-bold ${theme.text} text-sm`}>{selectedNode.fullName || selectedNode.name}</h3>
                      <span className={`text-xs ${theme.textLight}`}>
                        {selectedNode.type === 'direction' ? 'Directrice et codirecteurs'
                          : selectedNode.type === 'comite' ? 'Comité'
                          : selectedNode.type === 'axe' ? 'Axe thématique'
                          : selectedNode.type === 'champ' ? "Champ d'action" : 'Principe directeur'}
                      </span>
                    </div>
                  </div>

                  {selectedNode.description && (
                    <p className={`text-xs ${theme.textMuted} mb-4 leading-relaxed`}>{selectedNode.description}</p>
                  )}

                  {selectedNode.responsables && selectedNode.responsables.length > 0 ? (
                    <>
                      <div className={`text-xs font-semibold ${theme.textLight} uppercase tracking-wider mb-3`}>
                        {selectedNode.type === 'direction' || selectedNode.type === 'comite' ? 'Membres' : `Responsable${selectedNode.responsables.length > 1 ? 's' : ''}`}
                      </div>
                      <div className="space-y-3">
                        {selectedNode.responsables.map(p => (
                          <div key={p.name} className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm"
                              style={{ backgroundColor: selectedNode.color + '30', color: selectedNode.color }}>
                              {p.initials}
                            </div>
                            <div>
                              <span className={`text-sm font-medium ${darkMode ? 'text-slate-200' : 'text-gray-800'}`}>{p.name}</span>
                              {p.role && <div className={`text-xs ${theme.textLight}`}>{p.role}</div>}
                            </div>
                          </div>
                        ))}
                      </div>
                    </>
                  ) : (
                    <p className={`text-xs ${theme.textMuted} italic`}>Les membres de ce comité seront ajoutés prochainement.</p>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // APP PRINCIPALE — ONGLETS
    // ═══════════════════════════════════════════════════════════════════════════

    function MainApp() {
      const [darkMode, setDarkMode] = useState(true);
      const [activeTab, setActiveTab] = useState('structure');
      const [csvLoading, setCsvLoading] = useState(true);
      const [csvError, setCsvError] = useState(null);
      const [analyseData, setAnalyseData] = useState({});
      const [chantiersMeta, setChantiersMeta] = useState([]);

      useEffect(() => {
        fetch('data.csv')
          .then(r => { if (!r.ok) throw new Error('CSV introuvable'); return r.text(); })
          .then(text => {
            const rows = parseCSV(text);
            const allRows = csvRowsToAllData(rows);

            // Vue globale : seulement les actions approuvées
            const approvedActions = allRows.filter(r => r.approuve !== 'non');
            vueGlobaleData.actions = approvedActions;

            // Analyse : toutes les lignes (y compris GAPs non approuvés)
            const ad = buildAnalyseData(allRows);
            setAnalyseData(ad);
            setChantiersMeta(buildChantiersMeta(allRows, ad));
            setCsvLoading(false);
          })
          .catch(err => { setCsvError(err.message); setCsvLoading(false); });
      }, []);

      const tabs = [
        { id: 'structure',   label: 'Structure & Gouvernance', icon: 'structure' },
        { id: 'vue-globale', label: 'Vue globale', icon: 'vue-globale' },
        { id: 'analyse',     label: 'Analyse des chantiers', icon: 'analyse' },
      ];

      const tabBarBg = darkMode ? '#0f172a' : '#ffffff';
      const tabBarBorder = darkMode ? '#1e293b' : '#e5e7eb';
      const tabActiveText = darkMode ? '#e2e8f0' : '#111827';
      const tabInactiveText = darkMode ? '#64748b' : '#6b7280';
      const tabActiveBg = darkMode ? '#1e293b' : '#f3f4f6';
      const tabHoverBg = darkMode ? '#1e293b' : '#f9fafb';

      return (
        <div style={{ minHeight: '100vh', backgroundColor: darkMode ? '#0f172a' : '#f3f4f6' }}>
          {/* ── TAB BAR ── */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 16px', height: 49, backgroundColor: tabBarBg, borderBottom: `1px solid ${tabBarBorder}`, position: 'sticky', top: 0, zIndex: 100 }}>
            {/* Tabs */}
            <div style={{ display: 'flex', gap: 4 }}>
              {tabs.map(tab => {
                const active = activeTab === tab.id;
                return (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    style={{
                      display: 'flex',
                      alignItems: 'center',
                      gap: 6,
                      padding: '6px 14px',
                      borderRadius: 8,
                      border: 'none',
                      cursor: 'pointer',
                      fontSize: 13,
                      fontWeight: active ? 600 : 400,
                      color: active ? tabActiveText : tabInactiveText,
                      backgroundColor: active ? tabActiveBg : 'transparent',
                      transition: 'all 0.15s',
                    }}
                    onMouseEnter={(e) => { if (!active) e.currentTarget.style.backgroundColor = tabHoverBg; }}
                    onMouseLeave={(e) => { if (!active) e.currentTarget.style.backgroundColor = 'transparent'; }}
                  >
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                      {tab.icon === 'structure' && (<>
                        <circle cx="8" cy="8" r="6.5" /><circle cx="8" cy="8" r="3" />
                        <circle cx="8" cy="4" r="1" fill="currentColor" stroke="none" />
                        <circle cx="11.5" cy="9.5" r="1" fill="currentColor" stroke="none" />
                        <circle cx="4.5" cy="9.5" r="1" fill="currentColor" stroke="none" />
                      </>)}
                      {tab.icon === 'vue-globale' && (<>
                        <circle cx="8" cy="8" r="2" fill="currentColor" stroke="none" />
                        <circle cx="8" cy="2" r="1.2" fill="currentColor" stroke="none" />
                        <circle cx="13" cy="5.5" r="1.2" fill="currentColor" stroke="none" />
                        <circle cx="13" cy="11" r="1.2" fill="currentColor" stroke="none" />
                        <circle cx="8" cy="14" r="1.2" fill="currentColor" stroke="none" />
                        <circle cx="3" cy="11" r="1.2" fill="currentColor" stroke="none" />
                        <circle cx="3" cy="5.5" r="1.2" fill="currentColor" stroke="none" />
                        <line x1="8" y1="8" x2="8" y2="2" /><line x1="8" y1="8" x2="13" y2="5.5" />
                        <line x1="8" y1="8" x2="13" y2="11" /><line x1="8" y1="8" x2="8" y2="14" />
                        <line x1="8" y1="8" x2="3" y2="11" /><line x1="8" y1="8" x2="3" y2="5.5" />
                      </>)}
                      {tab.icon === 'analyse' && (<>
                        <rect x="2" y="7" width="3" height="7" rx="0.5" fill="currentColor" stroke="none" />
                        <rect x="6.5" y="4" width="3" height="10" rx="0.5" fill="currentColor" stroke="none" />
                        <rect x="11" y="2" width="3" height="12" rx="0.5" fill="currentColor" stroke="none" />
                      </>)}
                    </svg>
                    {tab.label}
                  </button>
                );
              })}
            </div>

            {/* Title */}
            <div style={{ position: 'absolute', left: '50%', transform: 'translateX(-50%)', fontSize: 13, fontWeight: 600, color: darkMode ? '#94a3b8' : '#6b7280', letterSpacing: '0.02em', pointerEvents: 'none' }}>
              RSN — Tableau de bord
            </div>

            {/* Dark mode toggle */}
            <button
              onClick={() => setDarkMode(!darkMode)}
              style={{
                display: 'flex',
                alignItems: 'center',
                gap: 6,
                padding: '6px 12px',
                borderRadius: 20,
                border: `1px solid ${darkMode ? '#334155' : '#d1d5db'}`,
                backgroundColor: darkMode ? '#1e293b' : '#f9fafb',
                color: darkMode ? '#94a3b8' : '#6b7280',
                cursor: 'pointer',
                fontSize: 12,
                fontWeight: 500,
                transition: 'all 0.15s',
              }}
            >
              {darkMode ? (
                <>
                  <svg xmlns="http://www.w3.org/2000/svg" style={{ width: 14, height: 14 }} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                  </svg>
                  Mode clair
                </>
              ) : (
                <>
                  <svg xmlns="http://www.w3.org/2000/svg" style={{ width: 14, height: 14 }} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                  </svg>
                  Mode sombre
                </>
              )}
            </button>
          </div>

          {/* ── CONTENT ── */}
          {csvLoading && (
            <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: 'calc(100vh - 49px)', color: darkMode ? '#94a3b8' : '#6b7280' }}>
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 32, marginBottom: 12 }}>⏳</div>
                <p>Chargement des données...</p>
              </div>
            </div>
          )}
          {csvError && (
            <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: 'calc(100vh - 49px)', color: '#ef4444' }}>
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 32, marginBottom: 12 }}>⚠️</div>
                <p>Erreur : {csvError}</p>
                <p style={{ fontSize: 12, color: darkMode ? '#64748b' : '#9ca3af', marginTop: 8 }}>Vérifiez que data.csv est présent à côté de index.html</p>
              </div>
            </div>
          )}
          {activeTab === 'structure' && <StructureGouvernance darkMode={darkMode} />}
          {!csvLoading && !csvError && activeTab === 'vue-globale' && <RSNRadialGraph darkMode={darkMode} />}
          {!csvLoading && !csvError && activeTab === 'analyse' && <AnalyseChantiers darkMode={darkMode} analyseData={analyseData} chantiersMeta={chantiersMeta} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MainApp />);
  </script>
</body>
</html>
