<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSN — Tableau de bord</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    var VERSION = '1.2';
    var modules = [
      'js/config.js',
      'js/data.js',
      'js/components/shared.jsx',
      'js/components/chantiers.jsx',
      'js/components/vue-globale.jsx',
      'js/components/suivi.jsx',
      'js/components/structure.jsx',
      'js/app.jsx'
    ];
    Promise.all(modules.map(function(f) {
      return fetch(f + '?v=' + VERSION).then(function(r) {
        if (!r.ok) throw new Error('Erreur chargement ' + f);
        return r.text().then(function(text) { return '// --- ' + f + ' ---\n' + text; });
      });
    }))
    .then(function(sources) {
      var result = Babel.transform(sources.join('\n;\n'), { presets: ['env', 'react'] });
      (0, eval)(result.code);
    })
    .catch(function(err) {
      document.getElementById('root').innerHTML =
        '<div style="color:#ef4444;padding:32px;font-family:system-ui">' +
        '<h2>Erreur de chargement</h2><p>' + err.message + '</p></div>';
    });
  </script>
</body>
</html>
