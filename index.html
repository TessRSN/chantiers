<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSN — Tableau de bord</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect } = React;

    // ═══════════════════════════════════════════════════════════════════════════
    // VUE GLOBALE — DONNÉES
    // ═══════════════════════════════════════════════════════════════════════════

    // ── Configuration statique des axes et chantiers (graphe radial) ──
    const AXES_CONFIG = [
      { id: 'A1', name: 'Plateformes numériques', fullName: 'Axe 1 : Plateformes numériques et gouvernance', type: 'axe', color: '#3B82F6' },
      { id: 'A2', name: 'Modélisation et méthodes', fullName: 'Axe 2 : Modélisation et méthodes numériques', type: 'axe', color: '#8B5CF6' },
      { id: 'A3', name: 'Interventions numériques', fullName: 'Axe 3 : Interventions numériques', type: 'axe', color: '#EC4899' },
      { id: 'A4', name: 'Transformation numérique', fullName: 'Axe 4 : Transformation numérique', type: 'axe', color: '#F59E0B' },
      { id: 'CA-FORM', name: 'Formation', fullName: "Champ d'action : Formation interdisciplinaire", type: 'champ', color: '#10B981' },
      { id: 'CA-MOB', name: 'Mobilisation', fullName: "Champ d'action : Mobilisation des connaissances", type: 'champ', color: '#14B8A6' },
      { id: 'CA-RENF', name: 'Renforcement', fullName: "Champ d'action : Renforcement des capacités", type: 'champ', color: '#06B6D4' },
      { id: 'PD-ENG', name: 'Engagement citoyen', fullName: 'Principe directeur : Engagement citoyen', type: 'principe', color: '#6366F1' },
      { id: 'PD-CONF', name: 'Numérique de confiance', fullName: 'Principe directeur : Numérique de confiance', type: 'principe', color: '#A855F7' },
      { id: 'PD-DUR', name: 'Santé durable', fullName: 'Principe directeur : Santé durable', type: 'principe', color: '#22C55E' },
      { id: 'PD-SCI', name: 'Science ouverte', fullName: 'Principe directeur : Science ouverte', type: 'principe', color: '#EAB308' },
      { id: 'PD-EDIA', name: 'EDIA', fullName: 'Principe directeur : EDIA', type: 'principe', color: '#EF4444' },
    ];

    const CHANTIERS_CONFIG = [
      { id: 'C1', name: 'Guides & Outils', verb: 'PRODUIRE', color: '#2563EB', icon: '📘' },
      { id: 'C2', name: 'Répertoires', verb: 'RECENSER', color: '#7C3AED', icon: '🗺️' },
      { id: 'C3', name: 'Concertation', verb: 'CONNECTER', color: '#DB2777', icon: '🤝' },
      { id: 'C4', name: 'Formation', verb: 'FORMER', color: '#059669', icon: '🎓' },
      { id: 'C5', name: 'Consultation', verb: 'ÉCOUTER', color: '#0891B2', icon: '👂' },
      { id: 'C6', name: 'Influence', verb: 'CONVAINCRE', color: '#DC2626', icon: '📢' },
      { id: 'C7', name: 'Événements', verb: 'ANIMER', color: '#D97706', icon: '🎪' },
    ];

    // ── Tables de correspondance CSV → IDs internes ──
    const AXE_NAME_TO_ID = {};
    AXES_CONFIG.forEach(a => { AXE_NAME_TO_ID[a.fullName] = a.id; });

    const CHANTIER_NAME_TO_ID = {
      'Guides & Outils': 'C1',
      'Répertoires & Cartographie': 'C2',
      'Concertation & Maillage': 'C3',
      'Formation & Relève': 'C4',
      'Consultation & Écoute': 'C5',
      'Influence & Représentation': 'C6',
      'Événements & Rayonnement': 'C7',
    };

    // ── Parseur CSV minimal (gère les virgules dans les guillemets) ──
    function parseCSV(text) {
      const lines = text.split('\n');
      const headers = parseCSVLine(lines[0]);
      const rows = [];
      for (let i = 1; i < lines.length; i++) {
        const line = lines[i].trim();
        if (!line) continue;
        const values = parseCSVLine(line);
        const row = {};
        headers.forEach((h, idx) => { row[h] = values[idx] || ''; });
        rows.push(row);
      }
      return rows;
    }

    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
          if (ch === '"' && line[i + 1] === '"') { current += '"'; i++; }
          else if (ch === '"') { inQuotes = false; }
          else { current += ch; }
        } else {
          if (ch === '"') { inQuotes = true; }
          else if (ch === ',') { result.push(current.trim()); current = ''; }
          else { current += ch; }
        }
      }
      result.push(current.trim());
      return result;
    }

    // ── Chargement CSV → toutes les lignes enrichies ──
    function csvRowsToAllData(rows) {
      return rows.map(row => ({
        id: row['ID Action'],
        axe: AXE_NAME_TO_ID[row['Axe']] || row['Axe'],
        chantier: CHANTIER_NAME_TO_ID[row['Chantier suggéré']] || row['Chantier suggéré'],
        action: row['Action réécrite'] || row['Action originale'],
        actionOriginale: row['Action originale'],
        objectif: row['Objectif stratégique'],
        axeFullName: row['Axe'],
        chantierFullName: row['Chantier suggéré'],
        // Champs analyse
        statusAnalyse: row['Statut analyse'] || '',
        projet: row['Projet'] || '',
        nomProjet: row['Nom projet'] || '',
        descriptionProjet: row['Description projet'] || '',
        notesAnalyse: row['Notes analyse'] || '',
        destination: row['Destination'] || '',
        approuve: (row['Approuvé'] || 'oui').toLowerCase(),
        statutObjectif: row['Statut objectif'] || 'non démarré',
      }));
    }

    // ── Construire ANALYSE_DATA dynamiquement depuis les lignes CSV ──
    function buildAnalyseData(allRows) {
      const byChantier = {};

      allRows.forEach(row => {
        const chantierId = row.chantier;
        if (!byChantier[chantierId]) byChantier[chantierId] = { projets: {}, parking: [] };

        // Parking lot : actions avec une destination (status = move)
        if (row.destination) {
          byChantier[chantierId].parking.push({
            id: row.id, axe: row.axeFullName, objectif: row.objectif,
            action: row.action, destination: row.destination,
            notes: row.notesAnalyse, status: 'move',
            statutObjectif: row.statutObjectif,
          });
          return;
        }

        // Actions assignées à un projet
        if (row.projet) {
          if (!byChantier[chantierId].projets[row.projet]) {
            byChantier[chantierId].projets[row.projet] = {
              id: row.projet, name: row.nomProjet, description: row.descriptionProjet, actions: [],
            };
          }
          byChantier[chantierId].projets[row.projet].actions.push({
            id: row.id, axe: row.axeFullName, objectif: row.objectif,
            action: row.action, status: row.statusAnalyse || 'keep',
            notes: row.notesAnalyse,
            statutObjectif: row.statutObjectif,
          });
        }
      });

      // Convertir en format attendu par les composants (clé numérique = id chantier)
      const result = {};
      const chantierIdToNum = { C1: 1, C2: 2, C3: 3, C4: 4, C5: 5, C6: 6, C7: 7 };
      Object.entries(byChantier).forEach(([cId, data]) => {
        const num = chantierIdToNum[cId];
        if (!num) return;
        const projects = Object.values(data.projets);
        if (projects.length === 0 && data.parking.length === 0) return;
        result[num] = { projects, parkingLot: data.parking };
      });

      return result;
    }

    // ── Construire CHANTIERS_META dynamiquement ──
    function buildChantiersMeta(allRows, analyseData) {
      const verbMap = { C1: 'PRODUIRE', C2: 'RECENSER', C3: 'CONNECTER', C4: 'FORMER', C5: 'ÉCOUTER', C6: 'CONVAINCRE', C7: 'ANIMER' };
      const nameMap = { C1: 'Guides & Outils', C2: 'Répertoires & Cartographie', C3: 'Concertation & Maillage', C4: 'Formation & Relève', C5: 'Consultation & Écoute', C6: 'Influence & Représentation', C7: 'Événements & Rayonnement' };
      const chantierIdToNum = { C1: 1, C2: 2, C3: 3, C4: 4, C5: 5, C6: 6, C7: 7 };

      return CHANTIERS_CONFIG.map(c => {
        const num = chantierIdToNum[c.id];
        const totalActions = allRows.filter(r => r.chantier === c.id && r.approuve !== 'non').length;
        const analyzed = !!analyseData[num];
        return { id: num, name: nameMap[c.id], verb: verbMap[c.id], totalActions, analyzed };
      });
    }

    // ── Objet vueGlobaleData — axes et chantiers statiques, actions chargées dynamiquement ──
    const vueGlobaleData = {
      axes: AXES_CONFIG,
      chantiers: CHANTIERS_CONFIG,
      actions: [],   // sera rempli par le CSV au démarrage (actions approuvées uniquement)
    };

    // ═══════════════════════════════════════════════════════════════════════════
    // ANALYSE CHANTIERS — CONFIG & DONNÉES
    // ═══════════════════════════════════════════════════════════════════════════

    const STATUS = {
      keep:    { label: "À garder",      bg: "bg-emerald-50",  border: "border-emerald-300", text: "text-emerald-800",  dot: "bg-emerald-500",  icon: "✅" },
      rewrite: { label: "À réécrire",    bg: "bg-amber-50",    border: "border-amber-300",   text: "text-amber-800",   dot: "bg-amber-500",    icon: "✏️" },
      gap:     { label: "Gap — À créer", bg: "bg-red-50",      border: "border-red-300",     text: "text-red-800",     dot: "bg-red-500",      icon: "🔴" },
      move:    { label: "À déplacer",    bg: "bg-sky-50",      border: "border-sky-300",     text: "text-sky-800",     dot: "bg-sky-500",      icon: "🔀" },
    };

    const STATUS_DARK = {
      keep:    { label: "À garder",      bg: "bg-emerald-950", border: "border-emerald-700", text: "text-emerald-300", dot: "bg-emerald-400", icon: "✅" },
      rewrite: { label: "À réécrire",    bg: "bg-amber-950",   border: "border-amber-700",   text: "text-amber-300",  dot: "bg-amber-400",   icon: "✏️" },
      gap:     { label: "Gap — À créer", bg: "bg-red-950",     border: "border-red-800",     text: "text-red-300",    dot: "bg-red-400",     icon: "🔴" },
      move:    { label: "À déplacer",    bg: "bg-sky-950",     border: "border-sky-700",     text: "text-sky-300",    dot: "bg-sky-400",     icon: "🔀" },
    };

    const getS = (status, darkMode) => darkMode ? STATUS_DARK[status] : STATUS[status];

    // ── Statut de progression des objectifs ──
    const PROGRESS = {
      'non démarré': { label: 'Non démarré', color: '#6b7280', bgLight: '#f3f4f6', bgDark: '#1e293b', borderLight: '#d1d5db', borderDark: '#475569', icon: '○' },
      'en cours':    { label: 'En cours',    color: '#f59e0b', bgLight: '#fffbeb', bgDark: '#451a03', borderLight: '#fcd34d', borderDark: '#92400e', icon: '◐' },
      'terminé':     { label: 'Terminé',     color: '#22c55e', bgLight: '#f0fdf4', bgDark: '#052e16', borderLight: '#86efac', borderDark: '#166534', icon: '●' },
    };

    function ProgressBadge({ statut, darkMode, size = 'sm' }) {
      const p = PROGRESS[statut] || PROGRESS['non démarré'];
      const bg = darkMode ? p.bgDark : p.bgLight;
      const border = darkMode ? p.borderDark : p.borderLight;
      const fontSize = size === 'xs' ? 10 : 11;
      const padding = size === 'xs' ? '1px 6px' : '2px 8px';
      return (
        <span style={{
          display: 'inline-flex', alignItems: 'center', gap: 4,
          fontSize, padding, borderRadius: 12,
          backgroundColor: bg, border: `1px solid ${border}`, color: p.color,
          fontWeight: 600, whiteSpace: 'nowrap',
        }}>
          <span style={{ fontSize: fontSize + 2 }}>{p.icon}</span> {p.label}
        </span>
      );
    }

    // (ANALYSE_DATA et CHANTIERS_META sont désormais construits dynamiquement depuis le CSV)

    // ═══════════════════════════════════════════════════════════════════════════
    // ANALYSE CHANTIERS — COMPOSANTS
    // ═══════════════════════════════════════════════════════════════════════════

    function StatusBadge({ status, darkMode }) {
      const s = getS(status, darkMode);
      return (
        <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium border ${s.bg} ${s.border} ${s.text}`}>
          {s.icon} {s.label}
        </span>
      );
    }

    function ActionRow({ action, darkMode }) {
      const [expanded, setExpanded] = useState(false);
      const s = getS(action.status, darkMode);
      const metaText  = darkMode ? 'text-slate-400' : 'text-gray-500';
      const metaBold  = darkMode ? 'text-slate-300' : 'text-gray-600';
      const noteBorder = darkMode ? 'border-slate-600' : 'border-gray-200';
      const noteText   = darkMode ? 'text-slate-400' : 'text-gray-600';
      const btnText    = darkMode ? 'text-slate-500 hover:text-slate-200' : 'text-gray-400 hover:text-gray-600';
      return (
        <div className={`rounded-lg border ${s.border} ${s.bg} p-3 mb-2`}>
          <div className="flex items-start justify-between gap-3">
            <div className="flex-1 min-w-0">
              <div className="flex flex-wrap items-center gap-2 mb-1">
                <span className={`font-mono text-xs font-bold ${metaText} shrink-0`}>{action.id}</span>
                <span className={`text-xs ${metaText} italic truncate`}>{action.axe}</span>
              </div>
              {action.objectif !== "—" && (
                <p className={`text-xs ${metaText} mb-1.5 leading-relaxed`}>
                  <span className={`font-medium ${metaBold}`}>Objectif :</span> {action.objectif}
                </p>
              )}
              <p className={`text-sm font-medium ${s.text} leading-snug`}>{action.action}</p>
            </div>
            <div className="flex flex-col items-end gap-1.5 shrink-0">
              <ProgressBadge statut={action.statutObjectif} darkMode={darkMode} size="xs" />
              <StatusBadge status={action.status} darkMode={darkMode} />
              {action.notes && (
                <button
                  onClick={() => setExpanded(!expanded)}
                  className={`text-xs ${btnText} underline underline-offset-2`}
                >
                  {expanded ? "Masquer note ▲" : "Note ▼"}
                </button>
              )}
            </div>
          </div>
          {expanded && action.notes && (
            <div className={`mt-2 pt-2 border-t ${noteBorder} text-xs ${noteText} italic leading-relaxed`}>
              💬 {action.notes}
            </div>
          )}
        </div>
      );
    }

    function ProjectCard({ project, darkMode }) {
      const [open, setOpen] = useState(true);
      const counts = project.actions.reduce((acc, a) => {
        acc[a.status] = (acc[a.status] || 0) + 1;
        return acc;
      }, {});

      const cardBg     = darkMode ? 'bg-slate-800'   : 'bg-white';
      const cardBorder = darkMode ? 'border-slate-700' : 'border-gray-200';
      const hoverBg    = darkMode ? 'hover:bg-slate-700' : 'hover:bg-gray-50';
      const chevron    = darkMode ? 'text-slate-500'  : 'text-gray-400';
      const titleColor = darkMode ? 'text-slate-100'  : 'text-gray-900';
      const descColor  = darkMode ? 'text-slate-400'  : 'text-gray-500';
      const countColor = darkMode ? 'text-slate-500'  : 'text-gray-400';
      const divider    = darkMode ? 'border-slate-700' : 'border-gray-100';

      return (
        <div className={`${cardBg} rounded-xl border ${cardBorder} shadow-sm mb-4 overflow-hidden`}>
          <button
            onClick={() => setOpen(!open)}
            className={`w-full flex items-start justify-between p-4 text-left ${hoverBg} transition-colors`}
          >
            <div className="flex items-start gap-3 flex-1 min-w-0">
              <span className={`${chevron} mt-0.5 shrink-0`}>{open ? "▼" : "▶"}</span>
              <div className="min-w-0">
                <h3 className={`font-semibold ${titleColor} leading-snug`}>{project.name}</h3>
                {project.description && (
                  <p className={`text-xs ${descColor} mt-1 leading-relaxed pr-4`}>{project.description}</p>
                )}
                <div className="flex flex-wrap gap-1.5 mt-2">
                  {Object.entries(counts).map(([status, count]) => {
                    const s = getS(status, darkMode);
                    return (
                      <span key={status} className={`flex items-center gap-1 text-xs px-2 py-0.5 rounded-full border ${s.bg} ${s.border} ${s.text}`}>
                        <span className={`w-1.5 h-1.5 rounded-full ${s.dot}`}></span>
                        {count} {s.label.toLowerCase()}
                      </span>
                    );
                  })}
                </div>
              </div>
            </div>
            <span className={`text-xs ${countColor} shrink-0 mt-1 ml-2`}>
              {project.actions.length} action{project.actions.length > 1 ? "s" : ""}
            </span>
          </button>
          {open && (
            <div className={`px-4 pb-4 pt-1 border-t ${divider}`}>
              {project.actions.map((a) => (
                <ActionRow key={a.id} action={a} darkMode={darkMode} />
              ))}
            </div>
          )}
        </div>
      );
    }

    function ParkingLot({ items, darkMode }) {
      const [open, setOpen] = useState(false);
      if (!items || items.length === 0) return null;

      const byDest = items.reduce((acc, item) => {
        const d = item.destination;
        if (!acc[d]) acc[d] = [];
        acc[d].push(item);
        return acc;
      }, {});

      const containerBg     = darkMode ? 'bg-sky-950'   : 'bg-sky-50';
      const containerBorder = darkMode ? 'border-sky-800' : 'border-sky-200';
      const hoverBg         = darkMode ? 'hover:bg-sky-900' : 'hover:bg-sky-100';
      const titleColor      = darkMode ? 'text-sky-200'  : 'text-sky-900';
      const subtitleColor   = darkMode ? 'text-sky-400'  : 'text-sky-600';
      const chevronColor    = darkMode ? 'text-sky-600'  : 'text-sky-400';
      const destLabel       = darkMode ? 'text-sky-400'  : 'text-sky-700';
      const itemBg          = darkMode ? 'bg-slate-800'  : 'bg-white';
      const itemBorder      = darkMode ? 'border-sky-800' : 'border-sky-200';
      const idColor         = darkMode ? 'text-slate-400' : 'text-gray-500';
      const objColor        = darkMode ? 'text-slate-400' : 'text-gray-500';
      const objBold         = darkMode ? 'text-slate-300' : '';
      const actionColor     = darkMode ? 'text-slate-200' : 'text-gray-800';
      const noteColor       = darkMode ? 'text-sky-400'   : 'text-sky-700';

      return (
        <div className={`mt-6 rounded-xl border ${containerBorder} ${containerBg} overflow-hidden`}>
          <button
            onClick={() => setOpen(!open)}
            className={`w-full flex items-center justify-between p-4 text-left ${hoverBg} transition-colors`}
          >
            <div className="flex items-center gap-3">
              <span className="text-xl">🅿️</span>
              <div>
                <h3 className={`font-semibold ${titleColor}`}>Parking lot — Actions à rediriger</h3>
                <p className={`text-xs ${subtitleColor} mt-0.5`}>
                  {items.length} action{items.length > 1 ? "s" : ""} identifiée{items.length > 1 ? "s" : ""} comme mal placée{items.length > 1 ? "s" : ""} dans ce chantier
                </p>
              </div>
            </div>
            <span className={`${chevronColor} text-sm`}>{open ? "▲" : "▼"}</span>
          </button>
          {open && (
            <div className="px-4 pb-4 space-y-4">
              {Object.entries(byDest).map(([dest, destItems]) => (
                <div key={dest}>
                  <p className={`text-xs font-semibold ${destLabel} mb-2 flex items-center gap-1.5`}>
                    <span>→</span> {dest}
                  </p>
                  <div className="space-y-2">
                    {destItems.map((item) => (
                      <div key={item.id} className={`${itemBg} rounded-lg border ${itemBorder} p-3`}>
                        <div className="flex items-center justify-between gap-2 mb-1">
                          <span className={`font-mono text-xs font-bold ${idColor}`}>{item.id}</span>
                          <span className="text-xs bg-sky-600 text-white px-2 py-0.5 rounded-full font-medium shrink-0">→ {item.destination}</span>
                        </div>
                        <p className={`text-xs ${objColor} italic mb-1`}>
                          <span className={`font-medium ${objBold}`}>Objectif :</span> {item.objectif}
                        </p>
                        <p className={`text-sm ${actionColor} mb-1.5 font-medium`}>{item.action}</p>
                        {item.notes && (
                          <p className={`text-xs ${noteColor} italic leading-relaxed`}>💬 {item.notes}</p>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    function StatsBar({ projects, parkingLot, darkMode }) {
      const counts = { keep: 0, rewrite: 0, gap: 0, move: 0 };
      projects.forEach((p) => p.actions.forEach((a) => { counts[a.status]++; }));
      const sourceTotal = counts.keep + counts.rewrite + counts.move;
      const gapTotal = counts.gap;

      const summaryBg     = darkMode ? 'bg-slate-800'   : 'bg-gray-50';
      const summaryBorder = darkMode ? 'border-slate-700' : 'border-gray-200';
      const summaryCount  = darkMode ? 'text-slate-300'  : 'text-gray-700';
      const summaryLabel  = darkMode ? 'text-slate-500'  : 'text-gray-500';
      const summaryDiv    = darkMode ? 'text-slate-600'  : 'text-gray-300';
      const gapBadgeBg    = darkMode ? 'bg-red-950'      : 'bg-red-50';
      const gapBadgeBd    = darkMode ? 'border-red-800'  : 'border-red-200';
      const gapBadgeTxt   = darkMode ? 'text-red-300'    : 'text-red-800';
      const gapBadgeSub   = darkMode ? 'text-red-400'    : 'text-red-700';
      const pkBadgeBg     = darkMode ? 'bg-sky-950'      : 'bg-sky-50';
      const pkBadgeBd     = darkMode ? 'border-sky-800'  : 'border-sky-200';
      const pkBadgeTxt    = darkMode ? 'text-sky-300'    : 'text-sky-800';
      const pkBadgeSub    = darkMode ? 'text-sky-400'    : 'text-sky-700';

      return (
        <div className="flex flex-wrap gap-2 mb-6">
          {["keep", "rewrite", "move"].map((status) => {
            const s = getS(status, darkMode);
            return (
              <div key={status} className={`flex items-center gap-2 px-3 py-2 rounded-lg border ${s.bg} ${s.border}`}>
                <span className={`w-2.5 h-2.5 rounded-full ${s.dot} shrink-0`}></span>
                <span className={`text-sm font-bold ${s.text}`}>{counts[status]}</span>
                <span className={`text-xs ${s.text}`}>{s.label}</span>
              </div>
            );
          })}

            <span className={`text-xs ${gapBadgeSub}`}>Gap — À créer</span>

            <span className={`text-xs ${pkBadgeSub}`}>À rediriger</span>

            <span className={`text-xs ${summaryLabel}`}>gaps</span>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
            {Object.values(STATUS).map((s) => (
              <div key={s.label} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>

            {Object.entries(PROGRESS).map(([key, p]) => (
              <div key={key} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 12, color: p.color }}>{p.icon}</span>
                <span style={{ fontSize: 12, color: labelColor }}>{p.label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function getProgressStats(analyseData, chantierId) {
      const data = analyseData[chantierId];
      if (!data) return null;
      const allActions = data.projects.flatMap(p => p.actions);
      const counts = {};
      Object.keys(PROGRESS).forEach(k => { counts[k] = 0; });
      allActions.forEach(a => { const s = a.statutObjectif || 'non démarré'; counts[s] = (counts[s] || 0) + 1; });
      return counts;
    }

      const [selectedId, setSelectedId] = useState(1);
      const meta = chantiersMeta.find((c) => c.id === selectedId) || { id: selectedId, name: '...', verb: '...', totalActions: 0, analyzed: false };
      const chantierData = analyseData[selectedId];

      const sidebarBg = darkMode ? '#1e293b' : 'white';
      const sidebarBorder = darkMode ? '#334155' : '#e5e7eb';
      const headerBorder = darkMode ? '#334155' : '#f3f4f6';
      const titleColor = darkMode ? '#f1f5f9' : '#1f2937';
      const subtitleColor = darkMode ? '#94a3b8' : '#9ca3af';
      const mainBg = darkMode ? '#0f172a' : '#f3f4f6';

      return (
        <div style={{ display: "flex", height: "calc(100vh - 49px)", fontFamily: "system-ui, sans-serif", backgroundColor: mainBg }}>
          {/* ── SIDEBAR ── */}
          <div style={{ width: 256, backgroundColor: sidebarBg, borderRight: `1px solid ${sidebarBorder}`, display: "flex", flexDirection: "column", overflowY: "auto", flexShrink: 0 }}>
            <div style={{ padding: "16px", borderBottom: `1px solid ${headerBorder}` }}>
              <div style={{ fontWeight: 700, fontSize: 14, color: titleColor }}>Chantiers RSN</div>

              {chantiersMeta.map((c) => {
                const active = selectedId === c.id;
                return (
                  <button
                    key={c.id}
                    onClick={() => setSelectedId(c.id)}
                    style={{
                      width: "100%",
                      textAlign: "left",
                      padding: "10px 12px",
                      borderRadius: 8,
                      marginBottom: 4,
                      border: active ? "1px solid #c7d2fe" : "1px solid transparent",
                      backgroundColor: active ? (darkMode ? '#1e3a5f' : '#eef2ff') : 'transparent',
                      cursor: "pointer",
                      transition: "background 0.15s",
                    }}
                    onMouseEnter={(e) => { if (!active) e.currentTarget.style.backgroundColor = darkMode ? '#334155' : '#f9fafb'; }}
                    onMouseLeave={(e) => { if (!active) e.currentTarget.style.backgroundColor = 'transparent'; }}
                  >
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: active ? (darkMode ? '#818cf8' : '#3730a3') : (darkMode ? '#cbd5e1' : '#374151') }}>
                        {c.id}. {c.name}
                      </span>
                      {c.analyzed ? (
                        <span style={{ fontSize: 12, color: "#10b981" }}>✓</span>
                      ) : (
                        <span style={{ fontSize: 12, color: darkMode ? '#475569' : '#d1d5db' }}>○</span>
                      )}
                    </div>
                    <div style={{ display: "flex", gap: 8, marginTop: 4, alignItems: "center" }}>
                      <span style={{ fontSize: 10, fontWeight: 700, padding: "1px 6px", borderRadius: 4, fontFamily: "monospace", backgroundColor: active ? (darkMode ? '#312e81' : '#e0e7ff') : (darkMode ? '#334155' : '#f3f4f6'), color: active ? (darkMode ? '#a5b4fc' : '#4338ca') : (darkMode ? '#94a3b8' : '#6b7280') }}>
                        {c.verb}
                      </span>
                      <span style={{ fontSize: 11, color: darkMode ? '#64748b' : '#9ca3af' }}>{c.totalActions} actions</span>
                    </div>
                    {(() => {
                      const stats = getProgressStats(analyseData, c.id);
                      if (!stats) return null;
                      const total = Object.values(stats).reduce((s, v) => s + v, 0);
                      if (total === 0) return null;
                      return (
                        <div style={{ display: 'flex', borderRadius: 4, overflow: 'hidden', height: 3, marginTop: 6, backgroundColor: darkMode ? '#334155' : '#e5e7eb' }}>
                          {Object.entries(PROGRESS).map(([key, p]) => {
                            const pct = (stats[key] / total) * 100;
                            if (pct === 0) return null;
                            return <div key={key} style={{ width: `${pct}%`, backgroundColor: p.color }} />;
                          })}
                        </div>
                      );
                    })()}
                  </button>
                );
              })}
            </nav>

            <AnalyseLegend darkMode={darkMode} />
          </div>

          {/* ── MAIN ── */}
          <div style={{ flex: 1, overflowY: "auto" }}>
            <div style={{ maxWidth: 780, margin: "0 auto", padding: "32px 24px" }}>
              {/* Header */}
              <div style={{ marginBottom: 24 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 4 }}>
                  <span style={{ backgroundColor: "#4f46e5", color: "white", fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 6, fontFamily: "monospace", letterSpacing: 1 }}>
                    {meta.verb}
                  </span>
                  <h2 style={{ fontSize: 24, fontWeight: 800, color: darkMode ? '#f1f5f9' : '#111827', margin: 0 }}>

                <p style={{ fontSize: 13, color: darkMode ? '#64748b' : '#9ca3af', margin: 0 }}>

                  {meta.analyzed ? " · Analyse complète" : " · En attente d'analyse"}
                </p>
              </div>

              {/* Content */}
              {chantierData ? (
                <>
                  {/* Progress bar */}
                  {(() => {
                    const allActions = chantierData.projects.flatMap(p => p.actions);
                    const progressCounts = {};
                    Object.keys(PROGRESS).forEach(k => { progressCounts[k] = 0; });
                    allActions.forEach(a => { const s = a.statutObjectif || 'non démarré'; progressCounts[s] = (progressCounts[s] || 0) + 1; });
                    const total = allActions.length;
                    if (total === 0) return null;
                    return (
                      <div style={{ marginBottom: 16 }}>
                        <div style={{ display: 'flex', borderRadius: 8, overflow: 'hidden', height: 8, backgroundColor: darkMode ? '#1e293b' : '#e5e7eb' }}>
                          {Object.entries(PROGRESS).map(([key, p]) => {
                            const pct = (progressCounts[key] / total) * 100;
                            if (pct === 0) return null;
                            return <div key={key} style={{ width: `${pct}%`, backgroundColor: p.color, transition: 'width 0.3s' }} />;
                          })}
                        </div>
                        <div style={{ display: 'flex', gap: 12, marginTop: 6 }}>
                          {Object.entries(PROGRESS).map(([key, p]) => (
                            progressCounts[key] > 0 && (
                              <span key={key} style={{ fontSize: 11, color: p.color, fontWeight: 500 }}>
                                {p.icon} {progressCounts[key]} {p.label.toLowerCase()}
                              </span>
                            )
                          ))}
                        </div>
                      </div>
                    );
                  })()}
                  <StatsBar projects={chantierData.projects} parkingLot={chantierData.parkingLot} darkMode={darkMode} />
                  {chantierData.projects.map((p) => (
                    <ProjectCard key={p.id} project={p} darkMode={darkMode} />
                  ))}
                  <ParkingLot items={chantierData.parkingLot} darkMode={darkMode} />
                </>
              ) : (
                <div style={{ backgroundColor: darkMode ? '#1e293b' : 'white', borderRadius: 16, border: `1px solid ${darkMode ? '#334155' : '#e5e7eb'}`, padding: "48px 32px", textAlign: "center" }}>
                  <div style={{ fontSize: 40, marginBottom: 12 }}>🔍</div>
                  <h3 style={{ fontSize: 18, fontWeight: 600, color: darkMode ? '#e2e8f0' : '#374151', marginBottom: 8 }}>
                    Ce chantier n'a pas encore été analysé
                  </h3>
                  <p style={{ fontSize: 14, color: darkMode ? '#64748b' : '#9ca3af' }}>
                    Poursuivez l'analyse pour remplir ce tableau chantier par chantier.
                  </p>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // VUE GLOBALE — DÉTAIL D'UNE ACTION (panneau latéral)
    // ═══════════════════════════════════════════════════════════════════════════

      const axe = showAxeLabel ? vueGlobaleData.axes.find(a => a.id === action.axe) : null;
      const hasExtra = action.objectif || (action.actionOriginale && action.actionOriginale !== action.action);

      return (
        <div
          className={`text-xs ${theme.textMuted} py-2 pl-3 border-l-2 ml-1 mb-1`}
          style={{ borderColor: borderColor || (darkMode ? '#334155' : '#d1d5db') }}
        >
          {axe && (
            <div className="flex items-center gap-1 mb-1">
              <div className="w-2 h-2 rounded-full" style={{ backgroundColor: axe.color }}></div>
              <span className={`text-xs ${theme.textLight}`}>{axe.name}</span>
            </div>
          )}
          <div className="flex items-start justify-between gap-1">
            <div className="flex-1">
              <div className="flex items-center gap-2">
                <span className={`font-mono ${theme.textLight}`} style={{ fontSize: 10 }}>{action.id}</span>
                <ProgressBadge statut={action.statutObjectif} darkMode={darkMode} size="xs" />

              <p className={`${darkMode ? 'text-slate-200' : 'text-gray-800'} mt-0.5 leading-relaxed`}>{action.action}</p>
            </div>
            {hasExtra && (
              <button
                onClick={() => setExpanded(!expanded)}
                className={`${theme.textLight} hover:${theme.text} shrink-0 mt-0.5`}

              </button>

          {expanded && (
            <div className={`mt-1.5 pt-1.5 space-y-1`} style={{ borderTop: `1px solid ${darkMode ? '#334155' : '#e5e7eb'}` }}>
              {action.objectif && (
                <p className={theme.textLight} style={{ fontSize: 10, lineHeight: '1.4' }}>
                  <span className={`font-semibold ${theme.textMuted}`}>Objectif stratégique :</span> {action.objectif}
                </p>

              {action.actionOriginale && action.actionOriginale !== action.action && (
                <p className={theme.textLight} style={{ fontSize: 10, lineHeight: '1.4', fontStyle: 'italic' }}>

    // ═══════════════════════════════════════════════════════════════════════════
    // VUE GLOBALE — COMPOSANT GRAPHE RADIAL
    // ═══════════════════════════════════════════════════════════════════════════

    function RSNRadialGraph({ darkMode }) {
      const [selectedNode, setSelectedNode] = useState(null);
      const [hoveredConnection, setHoveredConnection] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');

      const searchResults = useMemo(() => {
        if (!searchTerm.trim()) return [];
        const term = searchTerm.toLowerCase();
        return vueGlobaleData.actions.filter(a =>
          a.action.toLowerCase().includes(term) ||
          a.id.toLowerCase().includes(term)
        );
      }, [searchTerm]);

      const highlightedAxes = useMemo(() => [...new Set(searchResults.map(a => a.axe))], [searchResults]);
      const highlightedChantiers = useMemo(() => [...new Set(searchResults.map(a => a.chantier))], [searchResults]);

      const theme = {
        bg: darkMode ? 'bg-slate-950' : 'bg-gray-100',
        text: darkMode ? 'text-white' : 'text-gray-900',
        textMuted: darkMode ? 'text-slate-400' : 'text-gray-500',
        textLight: darkMode ? 'text-slate-500' : 'text-gray-400',
        cardBg: darkMode ? 'bg-slate-900' : 'bg-white',
        cardBorder: darkMode ? 'border-slate-800' : 'border-gray-200',
        buttonBg: darkMode ? 'bg-slate-800 hover:bg-slate-700' : 'bg-gray-200 hover:bg-gray-300',
        svgBg: darkMode ? '#0F172A' : '#FFFFFF',
        svgStroke: darkMode ? '#334155' : '#E5E7EB',
        svgNodeBg: darkMode ? '#1E293B' : '#F3F4F6',
        svgLabelPrimary: darkMode ? '#E2E8F0' : '#1F2937',
        svgLabelSecondary: darkMode ? '#94A3B8' : '#6B7280',
        svgLabelTertiary: darkMode ? '#64748B' : '#9CA3AF',
      };

      const width = 900;
      const height = 900;
      const centerX = width / 2;
      const centerY = height / 2;
      const innerRadius = 70;
      const axeRadius = 320;
      const chantierRadius = 200;
      const effetRadius = 70;

      const effetsStrategiques = [
        { id: 'ES1', name: 'Consolidation écosystème', color: '#3B82F6', chantiers: ['C1', 'C2'] },
        { id: 'ES2', name: 'Maillage environnement', color: '#10B981', chantiers: ['C3', 'C4', 'C7'] },
        { id: 'ES3', name: 'Rapprochement preneurs/décideurs', color: '#F59E0B', chantiers: ['C5', 'C6'] },
      ];

      const effetPositions = useMemo(() => {
        return effetsStrategiques.map((effet, i) => {
          const angle = (i / effetsStrategiques.length) * 2 * Math.PI - Math.PI / 2;
          return { ...effet, x: centerX + Math.cos(angle) * effetRadius, y: centerY + Math.sin(angle) * effetRadius, angle };
        });
      }, []);

      const connections = useMemo(() => {
        const conn = [];
        vueGlobaleData.chantiers.forEach(chantier => {
          vueGlobaleData.axes.forEach(axe => {
            const actions = vueGlobaleData.actions.filter(a => a.axe === axe.id && a.chantier === chantier.id);
            if (actions.length > 0) conn.push({ axe: axe.id, chantier: chantier.id, count: actions.length, actions });
          });
        });
        return conn;
      }, []);

      const axePositions = useMemo(() => {
        return vueGlobaleData.axes.map((axe, i) => {
          const angle = (i / vueGlobaleData.axes.length) * 2 * Math.PI - Math.PI / 2;
          return { ...axe, x: centerX + Math.cos(angle) * axeRadius, y: centerY + Math.sin(angle) * axeRadius, angle };
        });
      }, []);

      const chantierPositions = useMemo(() => {
        return vueGlobaleData.chantiers.map((chantier, i) => {
          const angle = (i / vueGlobaleData.chantiers.length) * 2 * Math.PI - Math.PI / 2;
          return { ...chantier, x: centerX + Math.cos(angle) * chantierRadius, y: centerY + Math.sin(angle) * chantierRadius, angle };
        });
      }, []);

      const getAxePos = (id) => axePositions.find(a => a.id === id);
      const getChantierPos = (id) => chantierPositions.find(c => c.id === id);

      const isHighlighted = (conn) => {
        if (!selectedNode) return true;
        return conn.axe === selectedNode.id || conn.chantier === selectedNode.id;
      };

      const selectedActions = useMemo(() => {
        if (!selectedNode) return [];
        if (selectedNode.type === 'chantier') return vueGlobaleData.actions.filter(a => a.chantier === selectedNode.id);
        return vueGlobaleData.actions.filter(a => a.axe === selectedNode.id);
      }, [selectedNode]);

      return (
        <div className={`${darkMode ? 'bg-slate-950' : 'bg-gray-100'} p-4 transition-colors duration-300`} style={{ height: 'calc(100vh - 49px)', overflowY: 'auto' }}>
          <div className="max-w-7xl mx-auto">
            <div className="text-center mb-6">
              <div className="flex justify-between items-center mb-4">
                <div className="flex-1"></div>
                <div className="flex-1 max-w-md mx-4">
                  <div className="relative">
                    <input
                      type="text"
                      placeholder="Rechercher une action..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                      className={`w-full px-4 py-2 pl-10 rounded-full text-sm ${darkMode ? 'bg-slate-800 text-white placeholder-slate-400 border-slate-700' : 'bg-white text-gray-900 placeholder-gray-400 border-gray-300'} border focus:outline-none focus:ring-2 focus:ring-purple-500`}
                    />
                    <svg className={`absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 ${darkMode ? 'text-slate-400' : 'text-gray-400'}`} xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    {searchTerm && (
                      <button onClick={() => setSearchTerm('')} className={`absolute right-3 top-1/2 -translate-y-1/2 ${darkMode ? 'text-slate-400 hover:text-white' : 'text-gray-400 hover:text-gray-600'}`}>✕</button>
                    )}
                  </div>
                  {searchTerm && (
                    <div className={`mt-1 text-xs ${theme.textMuted}`}>
                      {searchResults.length} action{searchResults.length !== 1 ? 's' : ''} trouvée{searchResults.length !== 1 ? 's' : ''}
                    </div>
                  )}
                </div>
                <div className="flex-1"></div>
              </div>
              <h1 className={`text-3xl font-bold ${darkMode ? 'bg-gradient-to-r from-blue-400 via-purple-400 to-pink-400' : 'bg-gradient-to-r from-blue-600 via-purple-600 to-pink-600'} bg-clip-text text-transparent mb-2`}>
                Réseau des Actions RSN
              </h1>
              <p className={`${theme.textMuted} text-sm`}>
                Cliquez sur un nœud pour voir ses connexions • {vueGlobaleData.actions.length} actions • {vueGlobaleData.axes.length} axes • {vueGlobaleData.chantiers.length} chantiers
              </p>
              {selectedNode && (
                <button onClick={() => setSelectedNode(null)} className={`mt-2 px-4 py-1 ${theme.buttonBg} rounded-full text-sm transition-colors ${theme.text}`}>
                  ✕ Réinitialiser la sélection
                </button>
              )}
            </div>

            <div className="flex flex-col lg:flex-row gap-6">
              <div className="flex-1 flex justify-center">
                <svg width={width} height={height} className="max-w-full h-auto">
                  <defs>
                    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
                      <stop offset="0%" stopColor="#6366F1" stopOpacity="0.3" />
                      <stop offset="100%" stopColor="#6366F1" stopOpacity="0" />
                    </radialGradient>
                  </defs>
                  <circle cx={centerX} cy={centerY} r={chantierRadius} fill="none" stroke={theme.svgStroke} strokeWidth="1" strokeDasharray="4 4" opacity="0.5" />
                  <circle cx={centerX} cy={centerY} r={axeRadius} fill="none" stroke={theme.svgStroke} strokeWidth="1" strokeDasharray="4 4" opacity="0.5" />

                  {effetPositions.map((effet) => {
                    const isEffetSelected = selectedNode?.id === effet.id && selectedNode?.type === 'effet';
                    const anyEffetSelected = selectedNode?.type === 'effet';
                    return effet.chantiers.map((chantierId) => {
                      const chantierPos = getChantierPos(chantierId);
                      if (!chantierPos) return null;
                      const highlighted = isEffetSelected || !anyEffetSelected;
                      return (
                        <line key={`${effet.id}-${chantierId}`} x1={effet.x} y1={effet.y} x2={chantierPos.x} y2={chantierPos.y}
                          stroke={effet.color} strokeWidth={isEffetSelected ? 4 : 3}
                          opacity={highlighted ? (isEffetSelected ? 0.8 : 0.4) : 0.1} className="transition-opacity duration-300" />
                      );
                    });
                  })}

                  {connections.map((conn, i) => {
                    const axePos = getAxePos(conn.axe);
                    const chantierPos = getChantierPos(conn.chantier);
                    const highlighted = isHighlighted(conn) && selectedNode?.type !== 'effet';
                    const isHovered = hoveredConnection === `${conn.axe}-${conn.chantier}`;
                    const midX = (axePos.x + chantierPos.x) / 2;
                    const midY = (axePos.y + chantierPos.y) / 2;
                    const ctrlX = centerX + (midX - centerX) * 0.3;
                    const ctrlY = centerY + (midY - centerY) * 0.3;
                    return (
                      <g key={i}>
                        <path d={`M ${chantierPos.x} ${chantierPos.y} Q ${ctrlX} ${ctrlY} ${axePos.x} ${axePos.y}`}
                          fill="none" stroke={axePos.color} strokeWidth={Math.max(1, conn.count * 1.5)}

                              <span className={`text-xs ${theme.textLight}`}>({chantierActions.length})</span>
                            </div>
                            {chantierActions.map(action => (
                              <ActionDetail key={action.id} action={action} darkMode={darkMode} theme={theme} />

                <span className={theme.textMuted}>Chantiers (7)</span>
              </div>

      const textPrimary = darkMode ? '#e2e8f0' : '#111827';
      const textSecondary = darkMode ? '#94a3b8' : '#6b7280';
      const textMuted = darkMode ? '#64748b' : '#9ca3af';

      const activeItem = selected || hovered;

      const getActiveData = () => {
        if (!activeItem) return null;
        if (activeItem.type === 'axe') return GOUVERNANCE_DATA.axes.find(a => a.id === activeItem.id);
        if (activeItem.type === 'champ') return GOUVERNANCE_DATA.champs.find(c => c.id === activeItem.id);
        if (activeItem.type === 'principe') return GOUVERNANCE_DATA.principes.find(p => p.id === activeItem.id);

      const activeData = getActiveData();

        <div style={{ padding: '32px 24px', maxWidth: 1200, margin: '0 auto' }}>

                  // Position in an arc at the bottom
                  const cx = 350;
                  const cy = 260;
                  const rx = 320;
                  const ry = 220;
                  const a = Math.PI * 0.15 + (i / (total - 1)) * Math.PI * 0.7;

                    <g key={ax.id}
                      style={{ cursor: 'pointer' }}
                      onClick={() => setSelected(isActive ? null : { type: 'axe', id: ax.id })}
                      onMouseEnter={() => setHovered({ type: 'axe', id: ax.id })}
                      onMouseLeave={() => setHovered(null)}
                    >
                      <rect x={px - w/2} y={py - h/2} width={w} height={h} rx={10}
                        fill={isActive ? ax.color : (darkMode ? '#1e293b' : '#eff6ff')}
                        stroke={ax.color} strokeWidth={isActive ? 2.5 : 1.5}
                        opacity={activeItem && !isActive ? 0.5 : 1}
                      />
                      <text x={px} y={py - 8} textAnchor="middle" dominantBaseline="central"
                        fill={isActive ? '#fff' : ax.color}
                        fontSize={11} fontWeight={700}
                      >
                        {ax.shortName}
                      </text>
                      <text x={px} y={py + 10} textAnchor="middle" dominantBaseline="central"
                        fill={isActive ? 'rgba(255,255,255,0.85)' : (darkMode ? '#94a3b8' : '#6b7280')}
                        fontSize={9}
                      >
                        {ax.name.length > 40 ? ax.name.slice(0, 38) + '…' : ax.name}
                      </text>
                    </g>
                  );
                })}

                {/* ── Flow arrows between axes ── */}
                {[0, 1, 2].map(i => {
                  const y1 = [110, 185, 260][i] + 26;
                  const y2 = [185, 260, 335][i] - 26;
                  const midY = (y1 + y2) / 2;
                  return (
                    <g key={`flow-${i}`}>
                      <line x1={100} y1={y1} x2={100} y2={y2} stroke={darkMode ? '#475569' : '#cbd5e1'} strokeWidth={1.5} markerEnd="url(#arrowDown)" />
                      <line x1={100} y1={y2} x2={100} y2={y1} stroke={darkMode ? '#475569' : '#cbd5e1'} strokeWidth={1.5} markerEnd="url(#arrowDown)" />
                      <text x={42} y={midY} textAnchor="middle" dominantBaseline="central"
                        fill={darkMode ? '#64748b' : '#9ca3af'}
                        fontSize={9} fontWeight={500} transform={`rotate(-90, 42, ${midY})`}
                      >
                        {flowLabels[i]}
                      </text>
                    </g>
                  );
                })}

                {/* Arrow marker */}
                <defs>
                  <marker id="arrowDown" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
                    <path d="M1,1 L4,6 L7,1" fill="none" stroke={darkMode ? '#475569' : '#cbd5e1'} strokeWidth="1.5" />
                  </marker>
                </defs>

                {/* ── "Axes" label ── */}
                <text x={220} y={60} textAnchor="middle" fill={darkMode ? '#60a5fa' : '#2563eb'} fontSize={12} fontWeight={700}>Axes</text>
              </svg>
            </div>

            {/* ── Droite : Panneau responsables ── */}
            <div style={{ position: 'sticky', top: 73 }}>
              <div style={{
                backgroundColor: cardBg, borderRadius: 16, border: `1px solid ${cardBorder}`,
                padding: 20, minHeight: 200,
                transition: 'all 0.2s',
              }}>
                {!activeData ? (
                  <div style={{ textAlign: 'center', padding: '40px 16px' }}>
                    <div style={{ fontSize: 36, marginBottom: 12, opacity: 0.4 }}>👤</div>
                    <p style={{ fontSize: 13, color: textMuted }}>Survolez ou cliquez sur un axe, champ d'action ou principe directeur pour afficher ses responsables.</p>
                  </div>
                ) : (
                  <>
                    <div style={{
                      display: 'inline-block', padding: '4px 12px', borderRadius: 20, marginBottom: 12,
                      fontSize: 10, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em',
                      backgroundColor: activeItem.type === 'axe' ? (darkMode ? '#1e3a5f' : '#dbeafe') : activeItem.type === 'champ' ? (darkMode ? '#064e3b' : '#d1fae5') : (darkMode ? '#433600' : '#fef3c7'),
                      color: activeItem.type === 'axe' ? (darkMode ? '#93c5fd' : '#1e40af') : activeItem.type === 'champ' ? (darkMode ? '#34d399' : '#065f46') : (darkMode ? '#fbbf24' : '#92400e'),
                    }}>
                      {activeItem.type === 'axe' ? 'Axe' : activeItem.type === 'champ' ? "Champ d'action" : 'Principe directeur'}
                    </div>
                    <h3 style={{ fontSize: 15, fontWeight: 700, color: textPrimary, marginBottom: 4 }}>
                      {activeData.shortName ? `${activeData.shortName} — ` : ''}{activeData.name}
                    </h3>
                    {activeData.description && (
                      <p style={{ fontSize: 11, color: textSecondary, marginBottom: 16, lineHeight: 1.5 }}>{activeData.description}</p>
                    )}
                    <div style={{ fontSize: 11, fontWeight: 600, color: textMuted, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 12 }}>
                      Responsable{activeData.responsables.length > 1 ? 's' : ''}
                    </div>
                    <div style={{ display: 'flex', gap: 16, flexWrap: 'wrap' }}>
                      {activeData.responsables.map(p => (
                        <PersonBadge key={p.name} person={p} darkMode={darkMode} />
                      ))}
                    </div>
                  </>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    // APP PRINCIPALE — ONGLETS
    // ═══════════════════════════════════════════════════════════════════════════

    function MainApp() {
      const [darkMode, setDarkMode] = useState(true);
      const [activeTab, setActiveTab] = useState('structure');
      const [csvLoading, setCsvLoading] = useState(true);
      const [csvError, setCsvError] = useState(null);
      const [analyseData, setAnalyseData] = useState({});
      const [chantiersMeta, setChantiersMeta] = useState([]);

      useEffect(() => {
        fetch('data.csv')
          .then(r => { if (!r.ok) throw new Error('CSV introuvable'); return r.text(); })
          .then(text => {
            const rows = parseCSV(text);
            const allRows = csvRowsToAllData(rows);

            // Vue globale : seulement les actions approuvées
            const approvedActions = allRows.filter(r => r.approuve !== 'non');
            vueGlobaleData.actions = approvedActions;

            // Analyse : toutes les lignes (y compris GAPs non approuvés)
            const ad = buildAnalyseData(allRows);
            setAnalyseData(ad);
            setChantiersMeta(buildChantiersMeta(allRows, ad));
            setCsvLoading(false);
          })
          .catch(err => { setCsvError(err.message); setCsvLoading(false); });
      }, []);

      const tabs = [
        { id: 'structure',   label: 'Structure & Gouvernance', icon: '🏛️' },
        { id: 'vue-globale', label: 'Vue globale', icon: '🕸️' },
        { id: 'analyse',     label: 'Analyse des chantiers', icon: '🔍' },
      ];

      const tabBarBg = darkMode ? '#0f172a' : '#ffffff';
      const tabBarBorder = darkMode ? '#1e293b' : '#e5e7eb';
      const tabActiveText = darkMode ? '#e2e8f0' : '#111827';
      const tabInactiveText = darkMode ? '#64748b' : '#6b7280';
      const tabActiveBg = darkMode ? '#1e293b' : '#f3f4f6';
      const tabHoverBg = darkMode ? '#1e293b' : '#f9fafb';

      return (
        <div style={{ minHeight: '100vh', backgroundColor: darkMode ? '#0f172a' : '#f3f4f6' }}>
          {/* ── TAB BAR ── */}
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 16px', height: 49, backgroundColor: tabBarBg, borderBottom: `1px solid ${tabBarBorder}`, position: 'sticky', top: 0, zIndex: 100 }}>
            {/* Tabs */}
            <div style={{ display: 'flex', gap: 4 }}>
              {tabs.map(tab => {
                const active = activeTab === tab.id;
                return (
                  <button
                    key={tab.id}
                    onClick={() => setActiveTab(tab.id)}
                    style={{
                      display: 'flex',
                      alignItems: 'center',
                      gap: 6,
                      padding: '6px 14px',
                      borderRadius: 8,
                      border: 'none',
                      cursor: 'pointer',
                      fontSize: 13,
                      fontWeight: active ? 600 : 400,
                      color: active ? tabActiveText : tabInactiveText,
                      backgroundColor: active ? tabActiveBg : 'transparent',
                      transition: 'all 0.15s',
                    }}
                    onMouseEnter={(e) => { if (!active) e.currentTarget.style.backgroundColor = tabHoverBg; }}
                    onMouseLeave={(e) => { if (!active) e.currentTarget.style.backgroundColor = 'transparent'; }}
                  >
                    <span style={{ fontSize: 14 }}>{tab.icon}</span>
                    {tab.label}
                  </button>
                );
              })}
            </div>

            {/* Title */}
            <div style={{ position: 'absolute', left: '50%', transform: 'translateX(-50%)', fontSize: 13, fontWeight: 600, color: darkMode ? '#94a3b8' : '#6b7280', letterSpacing: '0.02em', pointerEvents: 'none' }}>
              RSN — Tableau de bord
            </div>

            {/* Dark mode toggle */}
            <button
              onClick={() => setDarkMode(!darkMode)}
              style={{
                display: 'flex',
                alignItems: 'center',
                gap: 6,
                padding: '6px 12px',
                borderRadius: 20,
                border: `1px solid ${darkMode ? '#334155' : '#d1d5db'}`,
                backgroundColor: darkMode ? '#1e293b' : '#f9fafb',
                color: darkMode ? '#94a3b8' : '#6b7280',
                cursor: 'pointer',
                fontSize: 12,
                fontWeight: 500,
                transition: 'all 0.15s',
              }}
            >
              {darkMode ? (
                <>
                  <svg xmlns="http://www.w3.org/2000/svg" style={{ width: 14, height: 14 }} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                  </svg>
                  Mode clair
                </>
              ) : (
                <>
                  <svg xmlns="http://www.w3.org/2000/svg" style={{ width: 14, height: 14 }} fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                  </svg>
                  Mode sombre
                </>
              )}
            </button>
          </div>

          {/* ── CONTENT ── */}
          {csvLoading && (
            <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: 'calc(100vh - 49px)', color: darkMode ? '#94a3b8' : '#6b7280' }}>
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 32, marginBottom: 12 }}>⏳</div>
                <p>Chargement des données...</p>
              </div>
            </div>
          )}
          {csvError && (
            <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', height: 'calc(100vh - 49px)', color: '#ef4444' }}>
              <div style={{ textAlign: 'center' }}>
                <div style={{ fontSize: 32, marginBottom: 12 }}>⚠️</div>
                <p>Erreur : {csvError}</p>
                <p style={{ fontSize: 12, color: darkMode ? '#64748b' : '#9ca3af', marginTop: 8 }}>Vérifiez que data.csv est présent à côté de index.html</p>
              </div>
            </div>
          )}
          {activeTab === 'structure' && <StructureGouvernance darkMode={darkMode} />}
          {!csvLoading && !csvError && activeTab === 'vue-globale' && <RSNRadialGraph darkMode={darkMode} />}
          {!csvLoading && !csvError && activeTab === 'analyse' && <AnalyseChantiers darkMode={darkMode} analyseData={analyseData} chantiersMeta={chantiersMeta} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MainApp />);
  </script>
</body>
</html>
